name: CoDD Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CoDD
        run: pip install -e ".[scan,infra]"

      - name: Run CoDD Audit
        id: audit
        run: |
          set +e
          codd audit --diff origin/${{ github.base_ref }} --skip-review --json --output /tmp/codd-audit.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

          # Extract verdict for summary
          VERDICT=$(python3 -c "import json; print(json.load(open('/tmp/codd-audit.json'))['verdict'])")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Generate PR Comment
        if: always()
        id: comment
        run: |
          python3 - <<'PYEOF'
          import json, os

          try:
              with open("/tmp/codd-audit.json") as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              body = "## CoDD Audit\n\n:x: Audit failed to run. Check workflow logs."
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"body<<GHEOF\n{body}\nGHEOF\n")
              raise SystemExit(0)

          verdict = data["verdict"]
          risk = data["risk_level"]
          icon = {"APPROVE": ":white_check_mark:", "CONDITIONAL": ":warning:", "REJECT": ":x:"}[verdict]

          lines = [
              f"## CoDD Audit: {icon} {verdict}",
              "",
              f"**Risk Level**: {risk}",
              "",
              "| Check | Status | Details |",
              "|-------|--------|---------|",
          ]

          # Validation
          v = data["validation"]
          v_icon = ":white_check_mark:" if v["errors"] == 0 else ":x:"
          lines.append(f'| Validation | {v_icon} {v["status"]} | {v["documents_checked"]} docs, {v["errors"]} errors, {v["warnings"]} warnings |')

          # Policy
          p = data["policy"]
          p_icon = ":white_check_mark:" if p["status"] == "PASS" else ":x:"
          lines.append(f'| Policy | {p_icon} {p["status"]} | {p["files_checked"]} files, {p["critical"]} critical, {p["warnings"]} warnings |')

          # Impact
          imp = data["impact"]
          lines.append(f'| Impact | :mag: | {imp["affected_nodes"]} affected nodes |')

          # Review
          if data["review"]:
              r = data["review"]
              r_icon = ":white_check_mark:" if r["fail_count"] == 0 else ":warning:"
              lines.append(f'| Review | {r_icon} | {r["pass_count"]} pass, {r["fail_count"]} fail (avg {r["avg_score"]}) |')
          else:
              lines.append("| Review | :fast_forward: SKIPPED | |")

          lines.append("")
          lines.append(f"**Action**: {data['action_required']}")

          # Show changed files
          changed = data.get("changed_files", [])
          if changed:
              lines.append("")
              lines.append(f"<details><summary>Changed Files ({len(changed)})</summary>")
              lines.append("")
              for f in changed:
                  lines.append(f"- `{f}`")
              lines.append("")
              lines.append("</details>")

          # Show violations if any
          violations = p.get("violations", [])
          v_issues = v.get("issues", [])
          if violations or v_issues:
              lines.append("")
              lines.append("<details><summary>Issues Found</summary>")
              lines.append("")
              for vi in v_issues:
                  lines.append(f"- **[{vi['level']}]** {vi['location']}: {vi['message']}")
              for pv in violations:
                  loc = f"{pv['file']}:{pv['line']}" if pv.get("line") else pv["file"]
                  lines.append(f"- **[{pv['severity']}]** {loc} ({pv['rule_id']}): {pv['message']}")
              lines.append("")
              lines.append("</details>")

          lines.append("")
          lines.append("---")
          lines.append("*Generated by [CoDD](https://github.com/yohey-w/codd-dev) audit*")

          body = "\n".join(lines)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<GHEOF\n{body}\nGHEOF\n")
          PYEOF

      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.comment.outputs.body }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CoDD Audit')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Set exit code
        if: always()
        run: exit ${{ steps.audit.outputs.exit_code }}
