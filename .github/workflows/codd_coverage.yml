name: CoDD Coverage Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CoDD
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[scan,infra]"

      - name: Run coverage threshold gate
        id: coverage
        run: |
          set +e
          codd coverage check --format json > /tmp/coverage.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Generate coverage matrix
        if: always()
        run: codd coverage report --format md --output /tmp/coverage.md

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codd-coverage
          path: |
            /tmp/coverage.json
            /tmp/coverage.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codd-coverage-report -->';
            const body = `${marker}\n${fs.readFileSync('/tmp/coverage.md', 'utf8')}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Apply threshold result
        if: always()
        run: exit ${{ steps.coverage.outputs.exit_code }}
