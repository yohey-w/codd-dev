name: Dogfood Verification Loop

# ═══════════════════════════════════════════════════════════════════════════
# Runs the FREE, DETERMINISTIC axes of the dogfood verification loop
# (dogfood/README.md) as a recurring regression gate. One run = one loop tick:
# it executes the scripted axes D14/D8/D10/D11/D7 via
# `python3 dogfood/run_iteration.py` and FAILS the job if a NEW finding appears
# (the tick exits nonzero on any new finding).
#
# COST / SCOPE (deliberate): only the zero-LLM axes run here. The LLM axes
# (D1–D6, D9) and the external/human axes (D12 SWE-bench, D13 human-judge) are
# EXCLUDED from CI — they cost paid model calls or a human, and are recorded
# into dogfood/ledger.yaml by hand / by the
# examples/claude_workflows/codd-dogfood-loop.js driver instead. This workflow
# therefore makes ZERO paid LLM calls.
#
# `--preview` keeps the run read-only: every axis still executes and the job
# still fails on a new finding, but the ledger file is not rewritten inside the
# ephemeral CI checkout (no spurious diffs).
# ═══════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # Weekly: Mondays 06:00 UTC. The loop is a slow background regression gate,
    # not a per-PR check — the deterministic axes guard against drift over time.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: dogfood-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dogfood-loop:
    name: dogfood loop tick (deterministic axes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CoDD (real parsers for the alien-repo zoo)
        run: pip install -e ".[scan,infra]"

      - name: Run one dogfood loop tick — fails on any NEW finding
        # Exit nonzero iff a new finding appeared this tick. --preview runs every
        # scripted axis but does not rewrite the ledger in the CI checkout.
        # No --online: url: zoo repos are skipped here to stay hermetic + free.
        run: python3 dogfood/run_iteration.py --preview
