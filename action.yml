name: "CoDD Audit"
description: "Run CoDD change audit on your project — validate, impact, policy, and review checks"
author: "Yohei Watanabe"

branding:
  icon: "shield"
  color: "blue"

inputs:
  diff-target:
    description: "Git diff target (branch or commit)"
    required: false
    default: "origin/main"
  skip-review:
    description: "Skip AI review phase (faster, no AI cost)"
    required: false
    default: "true"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  codd-version:
    description: "CoDD version to install (e.g., '>=1.3.0'). Leave empty for latest."
    required: false
    default: ""
  post-comment:
    description: "Post audit results as PR comment"
    required: false
    default: "true"

outputs:
  verdict:
    description: "Audit verdict: APPROVE, CONDITIONAL, or REJECT"
    value: ${{ steps.audit.outputs.verdict }}
  risk-level:
    description: "Risk level: LOW, MEDIUM, or HIGH"
    value: ${{ steps.audit.outputs.risk_level }}
  report-json:
    description: "Path to the JSON audit report"
    value: ${{ steps.audit.outputs.report_path }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install CoDD
      shell: bash
      run: |
        if [ -n "${{ inputs.codd-version }}" ]; then
          pip install "codd-dev${{ inputs.codd-version }}"
        else
          pip install codd-dev
        fi

    - name: Run CoDD Audit
      id: audit
      shell: bash
      run: |
        REPORT_PATH="${{ runner.temp }}/codd-audit.json"

        ARGS="--diff ${{ inputs.diff-target }} --json --output $REPORT_PATH"
        if [ "${{ inputs.skip-review }}" = "true" ]; then
          ARGS="$ARGS --skip-review"
        fi

        set +e
        codd audit $ARGS
        EXIT_CODE=$?
        set -e

        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

        if [ -f "$REPORT_PATH" ]; then
          VERDICT=$(python3 -c "import json; print(json.load(open('$REPORT_PATH'))['verdict'])")
          RISK=$(python3 -c "import json; print(json.load(open('$REPORT_PATH'))['risk_level'])")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "risk_level=$RISK" >> "$GITHUB_OUTPUT"
        else
          echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
          echo "risk_level=HIGH" >> "$GITHUB_OUTPUT"
        fi

    - name: Generate PR Comment Body
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      id: comment
      shell: bash
      run: |
        python3 "${{ github.action_path }}/scripts/format_pr_comment.py" \
          "${{ steps.audit.outputs.report_path }}" >> "$GITHUB_OUTPUT"

    - name: Post/Update PR Comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const body = `${{ steps.comment.outputs.body }}`;
          if (!body) return;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('CoDD Audit')
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
