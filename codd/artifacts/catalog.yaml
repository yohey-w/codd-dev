# CoDD Core Artifact Catalog
#
# A universal, GENERAL lineup of V-model artifacts that a CoDD-managed project
# may produce. This catalog is shipped with CoDD and is project-agnostic: it
# names NO project, framework, or domain. Which artifacts a given project
# actually USES is selected per-project via an opt-in `artifact_contract:`
# section in that project's codd.yaml (mirroring the lexicon suggest + opt-in
# pattern: the catalog is universal; selection is per-project).
#
# Normalization principle (database-normalization analogy):
#   * `kind: ssot`         — holds irreducible decisions a human/AI must author.
#                            Each decision lives in EXACTLY ONE ssot artifact.
#   * `kind: derived_view` — machine-generated FROM ssot artifacts; never
#                            independently maintained. Must declare `derived_from`
#                            referencing the ssot ids it is computed from.
#
# No two ssot artifacts may own the same class of decision (that duplication is
# the real-world drift incident: two design documents both holding the same
# isolation facts, which then diverged). Anything mechanically re-derivable from
# an ssot artifact is a derived_view, not an ssot artifact.
#
# Entry fields:
#   id                : stable catalog identifier (referenced by contracts).
#   description       : one-line, project-agnostic summary.
#   kind              : ssot | derived_view.
#   derived_from      : list of catalog ids (REQUIRED + non-empty for
#                       derived_view; MUST be empty/absent for ssot).
#   produced_by       : the CoDD stage/command that produces the artifact
#                       (e.g. plan, generate, implement, extract, verify).
#   default_path_globs: conventional locations (glob patterns) where the
#                       artifact lives; used by the deterministic existence gate.
#   validator         : optional name of a deterministic check. Absent/null ⇒
#                       the default "exists and non-empty" gate is applied.
#   required_artifact_ids : optional list of NAMESPACED required-artifact ids
#                       (the `category:name` ids used by
#                       required_artifacts/defaults/*.yaml and the
#                       required-artifacts deriver) that this catalog artifact
#                       covers. This is the explicit cross-space mapping the
#                       artifact-id resolver (codd/artifact_ids.py) is built
#                       from: each required id may map to AT MOST ONE catalog
#                       artifact (validated on load, with `^[a-z0-9_]+:[a-z0-9_]+$`
#                       syntax). Required ids with no catalog counterpart must
#                       be listed in `intentionally_unmapped_required_ids`
#                       below — never silently dropped (drift guard).

version: 1

# Required-artifact ids that deliberately map to NO catalog artifact. Currently
# empty: every `design:*` id across the shipped profiles (cli/generic/iot/
# mobile/web) maps to a catalog artifact. A future profile id that genuinely
# has no catalog counterpart must be added here CONSCIOUSLY — the drift-guard
# test (tests/test_artifact_ids.py) fails on any id that is neither mapped nor
# declared here.
intentionally_unmapped_required_ids: []

artifacts:
  # ---------------------------------------------------------------------------
  # SSOT artifacts — irreducible authored decisions
  # ---------------------------------------------------------------------------
  - id: requirements
    description: "Functional requirements and constraints authored by the human (the north-star input)."
    kind: ssot
    produced_by: plan
    default_path_globs:
      - "docs/requirements*.md"
      - "docs/requirements/**/*.md"
      - "requirements*.md"
    required_artifact_ids:
      - "design:requirements"

  - id: design_spec
    description: "Design specification documents describing structure, behavior, and decisions."
    kind: ssot
    produced_by: generate
    default_path_globs:
      - "docs/design/**/*.md"
      - "docs/design*.md"
      - "design/**/*.md"
    validator: design_doc_frontmatter
    # Every profile-specific design document is a design_spec: the profiles
    # subdivide the design space per project type; the catalog holds the one
    # general artifact they all instantiate.
    required_artifact_ids:
      # shared / web
      - "design:system_design"
      - "design:api_design"
      - "design:database_design"
      - "design:ux_design"
      - "design:screen_flow_design"
      - "design:auth_authorization_design"
      - "design:screen_transitions"
      # cli
      - "design:command_interface_design"
      - "design:configuration_design"
      - "design:io_contract_design"
      - "design:error_handling_design"
      - "design:distribution_design"
      - "design:auth_integration_design"
      # generic
      - "design:interface_design"
      - "design:data_design"
      # iot
      - "design:device_firmware_design"
      - "design:connectivity_protocol_design"
      - "design:cloud_backend_design"
      - "design:data_retention_design"
      - "design:security_design"
      - "design:ota_update_design"
      - "design:safety_design"
      # mobile
      - "design:navigation_design"
      - "design:api_integration_design"
      - "design:local_data_sync_design"
      - "design:notification_design"
      - "design:release_distribution_design"

  - id: lexicon
    description: "Project lexicon: canonical domain terms and their authoritative definitions."
    kind: ssot
    produced_by: generate
    default_path_globs:
      - "**/project_lexicon.yaml"
      - "**/lexicon.yaml"

  - id: operation_flow
    description: "Declared operation flow: actor/verb/target/expected-outcome units of behavior."
    kind: ssot
    produced_by: plan
    default_path_globs:
      - "**/codd.yaml"

  - id: test_doc
    description: "Test specification documents and verifiable-behavior tables describing what must be verified."
    kind: ssot
    produced_by: generate
    default_path_globs:
      - "docs/test*.md"
      - "docs/tests/**/*.md"
      - "docs/design/**/*test*.md"

  - id: source
    description: "Application source code implementing the design specification."
    kind: ssot
    produced_by: implement
    default_path_globs:
      - "src/**/*"
      - "lib/**/*"
      - "app/**/*"

  - id: test_suite
    description: "Executable unit/integration tests that verify the source against the test documents."
    kind: ssot
    produced_by: implement
    default_path_globs:
      - "tests/**/*"
      - "test/**/*"
      - "**/*_test.*"
      - "**/test_*.*"

  - id: e2e_suite
    description: "Executable end-to-end tests exercising real operation flows against a running system."
    kind: ssot
    produced_by: implement
    default_path_globs:
      - "e2e/**/*"
      - "tests/e2e/**/*"
      - "**/*.e2e.*"

  - id: non_functional_requirements
    description: "Authored non-functional requirements (availability, scalability, capacity, reliability, security, durability/DR, observability/SLO targets)."
    kind: ssot
    produced_by: plan
    default_path_globs:
      - "docs/requirements/non_functional*"
      - "docs/requirements/nfr*"
      - "docs/non_functional*"
    required_artifact_ids:
      - "design:non_functional_requirements"

  - id: infrastructure_design
    description: "Infrastructure design: provisioned resources, networking, isolation, and the Infrastructure-as-Code that realizes them."
    kind: ssot
    produced_by: generate
    default_path_globs:
      - "docs/infra/**"
      - "docs/infrastructure/**"
      - "docs/design/**/infra*.md"
    required_artifact_ids:
      - "design:infrastructure_design"

  - id: deployment_design
    description: "Deployment design: runtime topology, environments, release/rollout strategy, and CI/CD delivery."
    kind: ssot
    produced_by: generate
    default_path_globs:
      - "docs/deploy/**"
      - "docs/deployment/**"
      - "docs/design/**/deploy*.md"
    required_artifact_ids:
      - "design:deployment_design"

  - id: operations_runbook
    description: "Operations runbook: scaling, health/monitoring, backup/restore, incident response, and routine operational procedures."
    kind: ssot
    produced_by: generate
    default_path_globs:
      - "docs/operations/**"
      - "docs/ops/**"
      - "docs/runbook*.md"
      - "docs/runbooks/**"
    required_artifact_ids:
      - "design:operations_runbook"

  # ---------------------------------------------------------------------------
  # Derived-view artifacts — machine-generated FROM ssot; never hand-maintained
  # ---------------------------------------------------------------------------
  - id: dependency_graph
    description: "Machine-built dependency/DAG view over design specs and source (not independently authored)."
    kind: derived_view
    derived_from:
      - design_spec
      - source
    produced_by: extract
    default_path_globs:
      - "**/scan/**/*.jsonl"
      - "**/scan/**/*.json"

  - id: coverage_report
    description: "Computed coverage of test documents/behaviors by the executable test and e2e suites."
    kind: derived_view
    derived_from:
      - test_doc
      - test_suite
      - e2e_suite
    produced_by: verify
    default_path_globs:
      - "**/coverage*.json"
      - "**/coverage*.xml"
      - "**/*coverage*.yaml"

  - id: traceability_matrix
    description: "Computed mapping from requirements to design, tests, and source (requirement reconciliation view)."
    kind: derived_view
    derived_from:
      - requirements
      - design_spec
      - operation_flow
    produced_by: verify
    default_path_globs:
      - "**/traceability*.json"
      - "**/reconciliation*.json"

  - id: reconciliation_ledger
    description: "Computed freshness ledger of doc-to-doc depends_on acknowledgements (not authored)."
    kind: derived_view
    derived_from:
      - design_spec
    produced_by: verify
    default_path_globs:
      - "**/reconciliation_ledger.json"
