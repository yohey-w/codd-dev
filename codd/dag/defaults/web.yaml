enabled_checks:
  - node_completeness
  - edge_validity
  - depends_on_consistency
  - task_completion
  - transitive_closure
design_doc_patterns:
  - "docs/design/*.md"
impl_file_patterns:
  - "src/**/*.ts"
  - "src/**/*.tsx"
  - "app/**/*.ts"
  - "app/**/*.tsx"
test_file_patterns:
  - "tests/**/*.py"
  - "tests/**/*.ts"
  - "tests/**/*.tsx"
  - "tests/**/*.js"
  - "tests/**/*.jsx"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
implementation_suffixes: [".ts", ".tsx", ".js", ".jsx"]
test_suffixes: [".ts", ".tsx", ".js", ".jsx", ".test.ts", ".spec.ts", ".test.js", ".spec.js"]
plan_task_file: "docs/design/implementation_plan.md"
