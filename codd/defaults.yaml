version: "0.2.0a1"
codd_required_version: null
codd_required_version_strict: false
project:
  frameworks: []
ai_command: "claude --print --permission-mode bypassPermissions --dangerously-skip-permissions --model claude-opus-4-8 --effort max --tools \"\""
ai_commands:
  plan_derive: null
  design_doc_extract: null
  criteria_expand: null
ai:
  # Wall-clock timeout (seconds) for a SINGLE AI subprocess call. A model CLI can
  # stall one call indefinitely with no error and no output (blocked on a
  # half-open socket); the recoverable-error retry never fires because nothing is
  # ever returned to classify, so without this the whole pipeline can freeze
  # forever. Every AI call carries this finite budget — a stall that exceeds it
  # kills the child and is treated as a transient transport error, flowing into
  # the same bounded auto-retry/backoff as a dropped socket (a one-off network
  # stall self-recovers; a persistently-hung call fails loudly after the bounded
  # attempts instead of hanging). Each retry attempt gets its own fresh timeout.
  #
  # null = use the shared default (codd.defaults.AI_TIMEOUT_SECONDS = 3600s).
  # 3600s is generous: a max-effort model writing a large design doc legitimately
  # runs many minutes (longest legitimate single call observed ~20min); the
  # silent stall this guard targets ran 47min+ and climbing. Lower it here for a
  # tighter bound (e.g. 1200 for 20min). Override precedence (first wins):
  #   CODD_AI_CALL_TIMEOUT env > CODD_AI_TIMEOUT_SECONDS env >
  #   ai.call_timeout_seconds > llm.timeout_seconds > the 3600s default.
  call_timeout_seconds: null
coding_principles: null
scan:
  source_dirs:
    - "src/"
  test_dirs:
    - "tests/"
  doc_dirs:
    - "docs/"
  config_files: []
  exclude:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/dist/**"
graph:
  store: "jsonl"
  path: "codd/scan"
bands:
  green:
    min_confidence: 0.90
    min_evidence_count: 2
  amber:
    min_confidence: 0.50
propagation:
  max_depth: 10
  stop_at_contract_boundary: true
coherence:
  capability_patterns: {}
  path_prefix_tolerant:
    - "src/"
    - "lib/"
    - "app/"
hitl:
  mode: cooperative
requirement_completeness:
  project_type: null
  channels:
    - askuserquestion
    - ntfy
    - lexicon
  ntfy_topic: ""
  questions: []
  ai_missing_items: false
  semantic_check: false
  ai_generate_options: false
  ai_timeout_seconds: 30
implement:
  # Write-time syntax sanity gate for `codd implement`: every AI-produced file
  # payload with a stdlib-checkable format (Python via ast, JSON, YAML, TOML)
  # must parse BEFORE anything is written to disk. A failure routes a clear
  # "file X is not valid <format>" message into ONE bounded retry through the
  # implement feedback prompt; if the retry also fails, the task fails loudly
  # naming the offending files — a syntactically broken file is never silently
  # written as "task done". Formats without a stdlib parser (TypeScript,
  # JavaScript, Go, ...) are skipped on purpose; the verify stage is their
  # backstop. The gate only inspects what the AI produced for the files being
  # written — never pre-existing project files. Cheap and deterministic (no
  # LLM calls). Set false to opt out.
  syntax_gate: true
  # Total `codd implement` attempts when the syntax gate is ON: one initial
  # generation plus bounded corrective retries. On a gate failure the retry
  # prompt names the offending file, the failing line, and the exact non-ASCII
  # character(s) with their U+XXXX codepoint, plus an ASCII-punctuation
  # directive -- steering a model (primed by non-ASCII requirements/context)
  # that slipped typographic/full-width punctuation into a code position back
  # to a parseable file. Default 3; minimum 1. NEVER unbounded -- a genuinely
  # unfixable file still fails loudly with nothing written. No effect when
  # syntax_gate is false (single attempt, legacy behavior).
  syntax_gate_max_attempts: 3
  # confusable_check (default ON): a SECOND write-time check, sibling of the
  # syntax gate, for non-ASCII lookalike (homoglyph) characters that the parser
  # ACCEPTS. The syntax gate catches non-ASCII that breaks parsing; it cannot
  # catch a Cyrillic "е" (U+0435) or "а" (U+0430) substituted for an ASCII
  # letter INSIDE an identifier -- "іd" looks like "id" but is a different name
  # (NameError / silent dict-key mismatch at runtime). The file parses, may even
  # pass tests written with the same wrong char, but is semantically broken: a
  # false-green. Current-generation models emit these intermittently. This check
  # tokenizes (Python: stdlib `tokenize`) and inspects ONLY code-position tokens
  # (identifiers, operators) -- STRING and COMMENT tokens are skipped entirely,
  # so non-ASCII inside string literals / comments (Japanese UI copy, etc.) is
  # NEVER flagged. It flags only MIXED-SCRIPT identifiers (ASCII-Latin mixed with
  # Cyrillic/Greek -- the high-signal homoglyph pattern, near-zero false-positive)
  # and non-ASCII in operator positions. Single-script non-Latin identifiers a
  # language genuinely allows are NOT flagged. Non-Python files are skipped (the
  # syntax gate is their backstop). A failure routes the same actionable retry
  # feedback through the same bounded budget (syntax_gate_max_attempts) and the
  # same atomic "nothing written until clean" guarantee. Cheap, deterministic,
  # no LLM calls. Set false to opt out of the confusable check only.
  confusable_check: true
  # Bounded retries when a single `codd implement` attempt yields NO usable
  # generated files for a TRANSIENT reason that re-issuing the identical call
  # can clear: empty AI output, a file-writing agent that produced no (readable)
  # file changes, file block(s) that were ALL invalid/out-of-scope, or a parse
  # that filtered down to zero usable files. A single such response (a model
  # emitting empty/unparseable text on one invocation, exit 0) otherwise
  # hard-fails a whole multi-hour greenfield autopilot run with no retry, even
  # though the re-issue succeeds. This budget is SEPARATE from (and additive
  # with) syntax_gate_max_attempts -- a no-usable retry produced no file to
  # validate, so it does not consume syntax-gate budget and vice-versa.
  # Backoff is index-scaled (1.5s / 3.0s / 4.5s). ANTI-FALSE-GREEN: 0 files is
  # STILL a failure by default -- only explicit `skip_generation: true` in the
  # design doc is a 0-file success; after this budget is exhausted the SAME
  # "produced 0 generated files" error is raised; retries NEVER relax path/scope
  # constraints and the syntax/confusable gates stay active on every retry.
  # Default 3 (4 total attempts); minimum 0 (0 = opt out / legacy no-retry
  # hard-fail). NEVER unbounded.
  no_usable_file_retries: 3
  # implement_oracle (default ON): the IMPLEMENT-TIME native-oracle gate. For a
  # compiler-class stack (TypeScript = `tsc --noEmit`; Go/Rust later via profile
  # + adapter) the greenfield implement stage runs the stack's native coherence
  # oracle AFTER all units are generated and BEFORE verify -- while the SUT can
  # still freely edit ALL files (source AND tests). It statically proves that
  # independently-generated artifacts agree on the symbols/modules they import
  # from each other (the src<->src and test<->helper mismatches -- TS2305/2724/
  # 2459 -- that verify's `tsc` catches TOO LATE, where auto-repair is blocked
  # from rewriting test files, so the mismatch ships as a permanent verify
  # failure). Runs ONCE per stage (a per-unit tsc would false-fail on an import
  # of a not-yet-generated unit). Before trusting a green result it CERTIFIES the
  # oracle's config scope (tsconfig include/files) covers src + tests + e2e +
  # helpers -- an uncovered test tree is a HARD FAIL, never a silent pass
  # (anti-false-green). On failure it normalizes diagnostics to language-neutral
  # evidence categories (missing_symbol / module_resolution_error /
  # test_not_collected / environment_build_error) and
  # re-runs implementation with that feedback (bounded), so implement does not
  # "succeed" until the oracle passes or fails honestly. A strict NO-OP for a
  # stack with no declared implement-time oracle (Python today: its backstop
  # stays the existing verify-stage coherence gates). Set false to opt out (this
  # re-opens the false-green window the gate closes). Greenfield-only.
  implement_oracle: true
  # Total implement-oracle attempts: one initial check + bounded corrective
  # retries that re-run implementation with normalized oracle feedback. Default 5,
  # sized to the escalation LADDER so every rung can be reached: initial(1) +
  # narrow(<=2) + expanded(1) + broad(1). The 2nd narrow attempt is only spent
  # while the repair is making progress (the loop classifies shrink vs
  # oscillation); oscillation escalates immediately, so the budget is not wasted
  # thrashing one rung. Minimum 1. NEVER unbounded -- a genuinely uncurable
  # incoherence still fails honestly (nothing is silently accepted). Only CURABLE
  # incoherence is retried; an environment/toolchain failure (failed dependency
  # install) is not handed to the SUT to "fix" in source.
  oracle_max_attempts: 5
  # Orphan-artifact gate (off | warn | enforce). The implement-time oracle's
  # invariant: every GENERATED source artifact must be owned by exactly one
  # implement task (or a declared harness/profile contract). An orphan (a file no
  # task owns) sits OUTSIDE the artifact-contract graph -- its repair scope and
  # write-fence are undecidable, so a non-deterministic SUT can keep mutating it
  # invisibly. 'warn' observes + reports orphans after implement but never blocks
  # (heuristic; the large behaviour change first rolled out as warn, validated on
  # the dogfood zoo, then promoted). 'enforce' (default, owner-set 2026-06-15)
  # makes an orphan a hard stage failure -- the orphan-artifact invariant. Scaffold
  # /harness-owned files (vitest.config.ts, tsconfig.json, ...) are profile-owned
  # and never flagged. 'off' disables it. A
  # legitimate helper a task wrote under its OWN output directory is adopted (it
  # is dir-owned), so the warn list should be small. Only active for stacks with
  # a declared implement-time oracle + a derivable owner index.
  orphan_artifact_gate: enforce
  # Bounded wall-clock for ONE implement-oracle command run (seconds). tsc on a
  # fresh build is fast, but a cold first run can compile a large module graph.
  # Default 600.
  oracle_timeout_seconds: 600
  # Bounded wall-clock for the implement-oracle's BLOCKING dependency install
  # (node stacks: npm/pnpm/yarn/bun -- so `tsc` + deps are materialized before
  # the typecheck). A cold cache can pull a large tree. Default 900.
  oracle_install_timeout_seconds: 900
  # Broad-repair STRATEGY (incremental | legacy). When the implement-time oracle
  # forces the BROAD rung (a wide-fan-out artifact -- a shared schema / barrel /
  # public entrypoint imported by many files -- whose narrow repair would thrash),
  # broad's EXECUTION is the question. 'incremental' (default) runs a BUDGETED
  # RESIDUAL COHERENCE CAMPAIGN: re-implement only the shared exporter/supplier
  # first, RE-RUN the whole-project oracle, then re-implement ONLY the importers it
  # STILL proves broken (re-derived from the live residual diagnostics), in
  # dependency order, bounded by a wall-clock budget + a recheck cap. Often the
  # exporter fix alone clears every importer, so the whole project goes green
  # WITHOUT re-implementing any consumer task. 'legacy' runs the old whole-project
  # regeneration (re-implement EVERY task, ~17 tasks * ~40-50 min/attempt) -- which
  # blew a 4h wall-clock on a strong SUT without converging. ANTI-FALSE-GREEN: in
  # BOTH strategies the WHOLE-PROJECT oracle is the ONLY thing that can discharge
  # the gate; a phase's local typecheck success proves nothing, and budget
  # exhaustion / non-convergence / unresolved residual is an HONEST FAILURE with a
  # partial-progress audit record, never a silent green.
  oracle_broad_strategy: incremental
  # Cumulative wall-clock budget for ONE broad CAMPAIGN, across all its phases
  # (seconds). The campaign stops BEFORE starting a phase whose remaining budget
  # could not also fit a verifying whole-project oracle recheck, then honest-fails
  # (workspace changes persist for resume; never green). Default 2700 (45 min) --
  # a residual campaign (1 supplier phase + a few importer phases) fits well
  # inside it, vs the legacy-broad 4h blow-up. Only applies to the incremental
  # strategy.
  oracle_broad_wall_clock_seconds: 2700
  # Cap on whole-project oracle RECHECKS within ONE broad campaign (each phase is
  # followed by exactly one recheck -- the green authority). Bounds the campaign
  # independent of the wall-clock so a fast-but-non-converging SUT still
  # terminates. Default 8; minimum 1. Only applies to the incremental strategy.
  oracle_broad_max_rechecks: 8
  # Chunk size for the SUPPLIER phase of a broad campaign (how many supplier/
  # exporter tasks to re-implement per supplier sub-phase). Default 1 -- the wide-
  # fan-out artifact is typically a single shared module; one focused exporter fix
  # is the highest-yield, lowest-cognitive-load step (especially for a weak SUT).
  oracle_broad_chunk_size: 1
  # Chunk size for the RESIDUAL IMPORTER phase (how many importer owner-tasks to
  # re-implement per residual sub-phase). Default 2 -- residual importers are
  # re-derived from the live diagnostics and repaired in dependency order; a small
  # chunk keeps each rerun's allowed-paths surface and wall-clock bounded.
  oracle_residual_chunk_size: 2
  # Legacy whole-project broad opt-in (default false). true ⇒ a wide-fan-out
  # artifact uses the OLD whole-project regeneration instead of the incremental
  # campaign (equivalent to oracle_broad_strategy: legacy for the wide-fan-out
  # trigger). Kept for parity / escape hatch; the incremental campaign is the
  # default because legacy broad does not fit the wall-clock on real builds.
  oracle_legacy_broad_enabled: false
  # Shared canonical output root for implement tasks WITHOUT an explicit
  # default_output_paths / implement_targets mapping (e.g. greenfield-derived
  # tasks). null = derive from scan.source_dirs[0] (usually "src/"). Every
  # unconfigured task then amends ONE coherent app layout; the old per-task
  # default (src/<task_slug>/) fragmented a greenfield build into N disjoint
  # app copies. Explicit per-design mappings always win over this root.
  output_root: null
  # Repo-root infrastructure artifacts: AI-emitted file paths matching these
  # patterns are written at the PROJECT ROOT instead of being confined under
  # (or dropped for being outside) the task's output paths. Matching is
  # deterministic: a "<dir>/**" pattern matches any file under that top-level
  # directory; any other pattern is fnmatch-ed component-by-component. The
  # match also applies to the path tail after stripping an output-path prefix
  # (an AI told to stay under src/ emits src/.github/workflows/ci.yml — that
  # workflow belongs at .github/workflows/ci.yml, where CI actually runs).
  # Existing root files that carry no codd @generated-by marker but COULD
  # carry one (marker-capable formats) are never overwritten — user-authored
  # content wins; formats codd cannot mark (YAML/JSON/TOML/no-suffix) follow
  # the implementer's normal overwrite semantics so re-runs converge.
  # Override with your own list to extend or disable (empty list = off).
  root_artifact_patterns:
    - ".github/**"
    - ".gitlab-ci.yml"
    - "pyproject.toml"
    - "setup.cfg"
    - "package.json"
    - "Dockerfile*"
    - "docker-compose*"
    - ".gitignore"
    - "README*"
    - "Makefile"
    - "LICENSE*"
fix:
  test_command: null  # auto-detected from package.json / pyproject.toml
  max_attempts: 3
  phenomenon:
    # `codd fix [PHENOMENON]` Stage 4: after the design doc is updated, propagate
    # the change into the affected implementation + test files (resolved
    # deterministically from the DAG), wrapped by the verify gate (no new red
    # DAG check + local tests) with targeted rollback on failure. Set false to
    # stop at the design-doc update. Override per-invocation with
    # `--no-propagate-impl`.
    propagate_impl: true
restore:
  git_evidence:
    # Brownfield restoration: git history as TESTIMONY evidence. Commit diffs
    # are fact; commit messages are testimony (a claim about the "why") that
    # attaches only where its changes survive into HEAD (git blame), is capped
    # at the amber confidence band, and may only feed candidate_answer leads on
    # open_questions or corroborate amber statements — never green facts.
    # Set false to skip all git subprocess calls during `codd restore`
    # (non-repo projects degrade to no testimony automatically either way).
    enabled: true
generate:
  body_retry:
    # `codd generate` re-asks the AI when a produced design-doc body fails
    # structural validation (missing required sections, malformed frontmatter).
    # Bounded to avoid burning tokens on a model that cannot converge. 0
    # disables the retry loop (single attempt).
    max_retries: 2
test_coverage:
  # Verifiable-Behavior (VB) coverage audit: every VB id declared in a test
  # document's VB table must be claimed by a `codd: covers vb=<id>` marker in a
  # test file. `codd test audit` reports gaps; `codd implement` enforces the
  # same gate (projects with no VB table pass with a one-line notice).
  gate: true       # set false to turn the implement-time gate into advisory-only
  max_retries: 2   # bounded re-implementation attempts before the gate fails
  docs: []         # explicit VB-table documents (empty = auto-discovery)
verify:
  typecheck_command: null
  test_command: null
  # ── FX3 execution evidence (anti-false-green) ──────────────────────────
  # `codd verify` (standalone runner) now produces EXECUTION EVIDENCE on top
  # of the structural DAG checks:
  #   1. source_integrity — deterministic stdlib parse check of the files
  #      under scan.source_dirs (.py via ast, .json, .yaml/.yml, .toml).
  #      Bounded by file count; languages without a stdlib parser are skipped
  #      (their backstop is the executed test/typecheck command). Any syntax
  #      error FAILS verification naming the broken files. Fast and LLM-free,
  #      hence default ON; set false to opt out.
  #   2. test command — verify.test_command (or fix.test_command) when set,
  #      otherwise auto-detected (pytest config, package.json test script,
  #      Cargo.toml, go.mod, *.bats, Makefile test target). A detected
  #      command is RUN (bounded by test_timeout_seconds); nonzero exit FAILS
  #      verification with the output captured for the repair loop. No
  #      detectable command -> recorded as "tests not executed".
  #   3. typecheck command — verify.typecheck_command (or typecheck.command
  #      when typecheck.enabled) is run the same way when configured.
  # The honesty rule: when NOTHING executable ran and only structural DAG
  # checks passed, plain `codd verify` still passes but prints a prominent
  # WARNING (existing brownfield/CI configs may intentionally be
  # structural-only); the greenfield autopilot treats the same state as a
  # verify STAGE FAILURE — it cannot certify a build it never executed.
  # Set allow_structural_only: true to declare structural-only verification
  # as the project's intended contract (silences the warning, passes the
  # autopilot gate).
  source_integrity: true
  allow_structural_only: false
  test_timeout_seconds: 600
  # ── node/TypeScript blocking dependency-install preflight ──────────────
  # For a node/TS project (project.language: typescript|node, or a package.json
  # at the root when no language is declared), verify runs a BLOCKING install
  # before typecheck/tests so `tsc` and the test runner have their deps:
  #   npm ci  (lockfile present)  |  npm install  (creates the lock)
  # pnpm/yarn/bun honored by lockfile detection; no implicit global npx. An
  # install failure is an honest environment_build_error that FAILS the stage
  # (never green, never a code-repair target), and typecheck/tests are skipped.
  # Set false to opt out; install_timeout_seconds bounds the install.
  install_preflight: true
  install_timeout_seconds: 900
  report_output: "docs/test/verify_report.md"
  e2e_setup_command: null  # e.g. "npx playwright install chromium"
  e2e_command: null         # all E2E tests
  e2e_deploy_command: null  # deploy/CDP-only tests (e.g. @cdp-only)
  e2e_ci_command: null      # CI-safe tests (excludes CDP-only)
runtime:
  crud_flow_targets: []
  action_outcome_targets: []
typecheck:
  enabled: false
  command: null
  max_repair_attempts: 3
conventions: []
extraction:
  frontmatter_alias: {}
# Advisory doctor checks (non-fatal). Both default-enabled; opt out per project.
surface_reconciliation:
  # Flag actor-facing interactive/authoring surfaces in source (literal <button>
  # mutating controls + generic contenteditable/role=textbox editors) whose
  # capability is not declared in any operation_flow and not covered by a runtime
  # action outcome target. Set enabled:false to silence; extend authoring_verbs
  # with non-English/custom control labels.
  enabled: true
  authoring_verbs: []
orphan_cover_markers:
  # Flag `codd: covers operation=X` test markers whose operation X is not declared
  # in any operation_flow (reverse reconciliation of the audit covers path).
  enabled: true
requirement_reconciliation:
  # Reconcile requirement documents against the declared operation_flow universe
  # ("required but undeclared" — the third edge next to surface_reconciliation
  # and orphan_cover_markers). Two advisory checks:
  # (A) `operation_flow.<id>` references in requirement docs must resolve to a
  #     declared operation (deterministic, zero false-positive surface).
  # (B) Markdown table rows are requirement units; a unit with no anchor into
  #     the declared universe (resolving reference, out-of-scope marker,
  #     declared route in the text, or term overlap with operation
  #     id/verb/target or runtime action targets) is reported. To prevent
  #     false-positive floods, only tables that already contain an
  #     `operation_flow.<id>` reference are audited by default; list heading
  #     substrings under `sections` to widen the scope deliberately.
  enabled: true
  # Requirement docs to scan (files or directories). Empty = auto-discovery:
  # docs/requirements/**/*.md plus conventional top-level requirements files.
  docs: []
  # Heading substrings whose tables are audited even without a marker, e.g.
  # ["functional requirements", "screen", "機能要件", "画面一覧"].
  sections: []
  # Phrases that mark a unit as deliberately out of scope. A non-empty list
  # REPLACES the built-in markers (out of scope / out-of-scope / スコープ外 /
  # 将来対応 / 対象外).
  out_of_scope_markers: []
  # Individual unit warnings shown before aggregation into a single overflow line.
  max_unit_warnings: 30
operations_derive:
  # Generative complement to requirement_reconciliation (the `codd operations`
  # command group). `derive` takes requirement units that anchor to NO declared
  # operation (the same deterministic detection requirement_reconciliation uses)
  # and asks the project's resolved AI command to propose operation_flow entries
  # (id/actor/verb/target/expected_outcomes). Proposals are written to
  # <codd-dir>/operations_proposal.yaml for human review; nothing is written to
  # codd.yaml until `codd operations approve` + `codd operations merge`. This
  # section is reserved for future tuning; all commands work with it absent, and
  # uncovered-unit detection reuses the requirement_reconciliation settings
  # above (docs / sections / out_of_scope_markers).
  enabled: false
dependency_freshness:
  # Doc-to-doc depends_on freshness backed by the reconciliation ledger
  # (<codd-dir>/reconciliation_ledger.json, written by `codd propagate --commit`).
  # The ledger is the primary mechanism. Default is an amber advisory in
  # `codd dag verify` (exit code unchanged); opt in to hard-gating with
  # severity: red. Without a ledger entry for an edge the check falls back to
  # a commit-recency heuristic — best-effort onboarding triage, not proof of
  # freshness: a joint tip commit (both docs touched together) is
  # disambiguated via exclusive-commit history, but repeated bulk commits can
  # still mask drift. The missing baseline is always reported explicitly.
  # NOTE: projects whose codd.yaml pins dag.enabled_checks must add
  # `dependency_freshness` to that list (codd dag verify prints a notice
  # listing registered-but-unselected checks).
  enabled: true
  severity: amber
artifact_contract:
  # Per-project, OPT-IN contract mapping pipeline stages to the catalog
  # artifact ids each stage MUST produce. Each stage declares its required
  # artifacts from the shipped core artifact catalog (codd/artifacts/catalog.yaml);
  # `codd contract verify` (and the `artifact_contract` dag check) then check
  # they exist and pass their validator. Absent/`enabled: false` = no behavior
  # change; existing projects are unaffected. The dag check is dormant unless
  # enabled, and defaults to an amber advisory (set severity: red to hard-gate).
  # NOTE: projects whose codd.yaml pins dag.enabled_checks must add
  # `artifact_contract` to that list (codd dag verify prints a notice listing
  # registered-but-unselected checks).
  enabled: false
  severity: amber
  stages: {}
enables_nudge:
  # Doctor advisory: an operation whose visible_to/expected_outcomes mention
  # another declared actor but that declares no `enables` relationship gets a
  # nudge to consider declaring one (observation vs capability-granting).
  enabled: true
greenfield:
  # `codd greenfield` — the unattended autopilot: write a requirements
  # document; CoDD plans waves, generates design docs, implements every task,
  # verifies with automatic repair, propagates, and runs the final health
  # check. All gates are auto-approved; checkpoints land in
  # .codd/greenfield_session.yaml (resume with `codd greenfield --resume`).
  # CLI flags override these per run.
  elicit: true              # run the advisory elicit+apply stage (never blocking)
  max_repair_attempts: 10   # automatic repair attempts during the verify stage
  coverage_gate: true       # enforce the verifiable-behavior gate per implement task
  ntfy_topic: ""            # ntfy topic/URL for progress pings (empty = off; notify-only)
  propagate_commit: true    # run propagate --verify/--commit (advisory on a fresh build)
  chunk_size: null          # run implement steps in chunks of N (null = single run)
  timeout_per_chunk: 600    # seconds per chunk when chunk_size is set
  vb_rework:
    # Bounded re-implementation rounds for the implement-stage marker-
    # AUTHENTICITY gate (the coverage gate has its own test_coverage.max_retries).
    # On an authenticity failure (an orphan / assertion-less / self-comparing
    # `codd: covers vb=` marker) the owning TEST tasks are re-driven with the
    # verbatim findings + the closed VB contract, then the UNCHANGED gate re-
    # judges. The gate is never loosened — this only grants bounded retries.
    # 0 = legacy behavior (fail immediately, no rework). Two determinism guards:
    # a round-over-round finding count that stops shrinking aborts early
    # (oscillation guard), and any edit to the declared VB-id set DURING rework
    # is an immediate RED (a test task must not legalize an orphan by editing
    # the VB registry).
    max_rounds: 2

# ── Task derivation (codd plan derive / greenfield implement) ──────────────
derive:
  # Bounded re-derivations for the greenfield derive-stage API-facade coverage
  # gate: the package-facade file's topology is harness-owned but its public-API
  # content is SUT-authored, so exactly one derived implement task must own it.
  # On a 0-or->=2-owner violation the stage re-derives with deterministic repair
  # feedback, up to this many times, before failing honestly.
  # 0 = legacy behavior (no re-derive; fail immediately on a coverage violation).
  api_facade_coverage_max_retries: 2
  # Bounded re-derivations for the greenfield derive-stage deliverable-surface
  # exclusion fence: when the plan-stage intake marks an optional deliverable
  # surface out-of-scope, no derived implement task may author it. On a violation
  # the stage re-derives with deterministic repair feedback naming the excluded
  # path(s), up to this many times, before failing honestly.
  # 0 = legacy behavior (no re-derive; fail immediately on an exclusion violation).
  deliverable_surface_max_retries: 2

# ── Deliverable surfaces (optional surfaces a project may exclude) ──────────
deliverable:
  # Surface-ids the plan-stage requirements intake deterministically classified as
  # out-of-scope (e.g. `runnable-entrypoint` for a "pure library, no CLI" spec).
  # Written by the pipeline; a manual entry is honored (override / kill-switch).
  # Empty = byte-identical legacy behavior (every optional surface is scaffolded).
  excluded_surfaces: []
