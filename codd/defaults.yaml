version: "0.2.0a1"
codd_required_version: null
codd_required_version_strict: false
project:
  frameworks: []
ai_command: "claude --print --permission-mode bypassPermissions --dangerously-skip-permissions --model claude-opus-4-8 --effort max --tools \"\""
ai_commands:
  plan_derive: null
  design_doc_extract: null
  criteria_expand: null
ai:
  # Wall-clock timeout (seconds) for a SINGLE AI subprocess call. A model CLI can
  # stall one call indefinitely with no error and no output (blocked on a
  # half-open socket); the recoverable-error retry never fires because nothing is
  # ever returned to classify, so without this the whole pipeline can freeze
  # forever. Every AI call carries this finite budget — a stall that exceeds it
  # kills the child and is treated as a transient transport error, flowing into
  # the same bounded auto-retry/backoff as a dropped socket (a one-off network
  # stall self-recovers; a persistently-hung call fails loudly after the bounded
  # attempts instead of hanging). Each retry attempt gets its own fresh timeout.
  #
  # null = use the shared default (codd.defaults.AI_TIMEOUT_SECONDS = 3600s).
  # 3600s is generous: a max-effort model writing a large design doc legitimately
  # runs many minutes (longest legitimate single call observed ~20min); the
  # silent stall this guard targets ran 47min+ and climbing. Lower it here for a
  # tighter bound (e.g. 1200 for 20min). Override precedence (first wins):
  #   CODD_AI_CALL_TIMEOUT env > CODD_AI_TIMEOUT_SECONDS env >
  #   ai.call_timeout_seconds > llm.timeout_seconds > the 3600s default.
  call_timeout_seconds: null
coding_principles: null
scan:
  source_dirs:
    - "src/"
  test_dirs:
    - "tests/"
  doc_dirs:
    - "docs/"
  config_files: []
  exclude:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/dist/**"
graph:
  store: "jsonl"
  path: "codd/scan"
bands:
  green:
    min_confidence: 0.90
    min_evidence_count: 2
  amber:
    min_confidence: 0.50
propagation:
  max_depth: 10
  stop_at_contract_boundary: true
coherence:
  capability_patterns: {}
  path_prefix_tolerant:
    - "src/"
    - "lib/"
    - "app/"
hitl:
  mode: cooperative
requirement_completeness:
  project_type: null
  channels:
    - askuserquestion
    - ntfy
    - lexicon
  ntfy_topic: ""
  questions: []
  ai_missing_items: false
  semantic_check: false
  ai_generate_options: false
  ai_timeout_seconds: 30
implement:
  # Write-time syntax sanity gate for `codd implement`: every AI-produced file
  # payload with a stdlib-checkable format (Python via ast, JSON, YAML, TOML)
  # must parse BEFORE anything is written to disk. A failure routes a clear
  # "file X is not valid <format>" message into ONE bounded retry through the
  # implement feedback prompt; if the retry also fails, the task fails loudly
  # naming the offending files — a syntactically broken file is never silently
  # written as "task done". Formats without a stdlib parser (TypeScript,
  # JavaScript, Go, ...) are skipped on purpose; the verify stage is their
  # backstop. The gate only inspects what the AI produced for the files being
  # written — never pre-existing project files. Cheap and deterministic (no
  # LLM calls). Set false to opt out.
  syntax_gate: true
  # Shared canonical output root for implement tasks WITHOUT an explicit
  # default_output_paths / implement_targets mapping (e.g. greenfield-derived
  # tasks). null = derive from scan.source_dirs[0] (usually "src/"). Every
  # unconfigured task then amends ONE coherent app layout; the old per-task
  # default (src/<task_slug>/) fragmented a greenfield build into N disjoint
  # app copies. Explicit per-design mappings always win over this root.
  output_root: null
  # Repo-root infrastructure artifacts: AI-emitted file paths matching these
  # patterns are written at the PROJECT ROOT instead of being confined under
  # (or dropped for being outside) the task's output paths. Matching is
  # deterministic: a "<dir>/**" pattern matches any file under that top-level
  # directory; any other pattern is fnmatch-ed component-by-component. The
  # match also applies to the path tail after stripping an output-path prefix
  # (an AI told to stay under src/ emits src/.github/workflows/ci.yml — that
  # workflow belongs at .github/workflows/ci.yml, where CI actually runs).
  # Existing root files that carry no codd @generated-by marker but COULD
  # carry one (marker-capable formats) are never overwritten — user-authored
  # content wins; formats codd cannot mark (YAML/JSON/TOML/no-suffix) follow
  # the implementer's normal overwrite semantics so re-runs converge.
  # Override with your own list to extend or disable (empty list = off).
  root_artifact_patterns:
    - ".github/**"
    - ".gitlab-ci.yml"
    - "pyproject.toml"
    - "setup.cfg"
    - "package.json"
    - "Dockerfile*"
    - "docker-compose*"
    - ".gitignore"
    - "README*"
    - "Makefile"
    - "LICENSE*"
fix:
  test_command: null  # auto-detected from package.json / pyproject.toml
  max_attempts: 3
  phenomenon:
    # `codd fix [PHENOMENON]` Stage 4: after the design doc is updated, propagate
    # the change into the affected implementation + test files (resolved
    # deterministically from the DAG), wrapped by the verify gate (no new red
    # DAG check + local tests) with targeted rollback on failure. Set false to
    # stop at the design-doc update. Override per-invocation with
    # `--no-propagate-impl`.
    propagate_impl: true
restore:
  git_evidence:
    # Brownfield restoration: git history as TESTIMONY evidence. Commit diffs
    # are fact; commit messages are testimony (a claim about the "why") that
    # attaches only where its changes survive into HEAD (git blame), is capped
    # at the amber confidence band, and may only feed candidate_answer leads on
    # open_questions or corroborate amber statements — never green facts.
    # Set false to skip all git subprocess calls during `codd restore`
    # (non-repo projects degrade to no testimony automatically either way).
    enabled: true
generate:
  body_retry:
    # `codd generate` re-asks the AI when a produced design-doc body fails
    # structural validation (missing required sections, malformed frontmatter).
    # Bounded to avoid burning tokens on a model that cannot converge. 0
    # disables the retry loop (single attempt).
    max_retries: 2
test_coverage:
  # Verifiable-Behavior (VB) coverage audit: every VB id declared in a test
  # document's VB table must be claimed by a `codd: covers vb=<id>` marker in a
  # test file. `codd test audit` reports gaps; `codd implement` enforces the
  # same gate (projects with no VB table pass with a one-line notice).
  gate: true       # set false to turn the implement-time gate into advisory-only
  max_retries: 2   # bounded re-implementation attempts before the gate fails
  docs: []         # explicit VB-table documents (empty = auto-discovery)
verify:
  typecheck_command: null
  test_command: null
  # ── FX3 execution evidence (anti-false-green) ──────────────────────────
  # `codd verify` (standalone runner) now produces EXECUTION EVIDENCE on top
  # of the structural DAG checks:
  #   1. source_integrity — deterministic stdlib parse check of the files
  #      under scan.source_dirs (.py via ast, .json, .yaml/.yml, .toml).
  #      Bounded by file count; languages without a stdlib parser are skipped
  #      (their backstop is the executed test/typecheck command). Any syntax
  #      error FAILS verification naming the broken files. Fast and LLM-free,
  #      hence default ON; set false to opt out.
  #   2. test command — verify.test_command (or fix.test_command) when set,
  #      otherwise auto-detected (pytest config, package.json test script,
  #      Cargo.toml, go.mod, *.bats, Makefile test target). A detected
  #      command is RUN (bounded by test_timeout_seconds); nonzero exit FAILS
  #      verification with the output captured for the repair loop. No
  #      detectable command -> recorded as "tests not executed".
  #   3. typecheck command — verify.typecheck_command (or typecheck.command
  #      when typecheck.enabled) is run the same way when configured.
  # The honesty rule: when NOTHING executable ran and only structural DAG
  # checks passed, plain `codd verify` still passes but prints a prominent
  # WARNING (existing brownfield/CI configs may intentionally be
  # structural-only); the greenfield autopilot treats the same state as a
  # verify STAGE FAILURE — it cannot certify a build it never executed.
  # Set allow_structural_only: true to declare structural-only verification
  # as the project's intended contract (silences the warning, passes the
  # autopilot gate).
  source_integrity: true
  allow_structural_only: false
  test_timeout_seconds: 600
  report_output: "docs/test/verify_report.md"
  e2e_setup_command: null  # e.g. "npx playwright install chromium"
  e2e_command: null         # all E2E tests
  e2e_deploy_command: null  # deploy/CDP-only tests (e.g. @cdp-only)
  e2e_ci_command: null      # CI-safe tests (excludes CDP-only)
runtime:
  crud_flow_targets: []
  action_outcome_targets: []
typecheck:
  enabled: false
  command: null
  max_repair_attempts: 3
conventions: []
extraction:
  frontmatter_alias: {}
# Advisory doctor checks (non-fatal). Both default-enabled; opt out per project.
surface_reconciliation:
  # Flag actor-facing interactive/authoring surfaces in source (literal <button>
  # mutating controls + generic contenteditable/role=textbox editors) whose
  # capability is not declared in any operation_flow and not covered by a runtime
  # action outcome target. Set enabled:false to silence; extend authoring_verbs
  # with non-English/custom control labels.
  enabled: true
  authoring_verbs: []
orphan_cover_markers:
  # Flag `codd: covers operation=X` test markers whose operation X is not declared
  # in any operation_flow (reverse reconciliation of the audit covers path).
  enabled: true
requirement_reconciliation:
  # Reconcile requirement documents against the declared operation_flow universe
  # ("required but undeclared" — the third edge next to surface_reconciliation
  # and orphan_cover_markers). Two advisory checks:
  # (A) `operation_flow.<id>` references in requirement docs must resolve to a
  #     declared operation (deterministic, zero false-positive surface).
  # (B) Markdown table rows are requirement units; a unit with no anchor into
  #     the declared universe (resolving reference, out-of-scope marker,
  #     declared route in the text, or term overlap with operation
  #     id/verb/target or runtime action targets) is reported. To prevent
  #     false-positive floods, only tables that already contain an
  #     `operation_flow.<id>` reference are audited by default; list heading
  #     substrings under `sections` to widen the scope deliberately.
  enabled: true
  # Requirement docs to scan (files or directories). Empty = auto-discovery:
  # docs/requirements/**/*.md plus conventional top-level requirements files.
  docs: []
  # Heading substrings whose tables are audited even without a marker, e.g.
  # ["functional requirements", "screen", "機能要件", "画面一覧"].
  sections: []
  # Phrases that mark a unit as deliberately out of scope. A non-empty list
  # REPLACES the built-in markers (out of scope / out-of-scope / スコープ外 /
  # 将来対応 / 対象外).
  out_of_scope_markers: []
  # Individual unit warnings shown before aggregation into a single overflow line.
  max_unit_warnings: 30
operations_derive:
  # Generative complement to requirement_reconciliation (the `codd operations`
  # command group). `derive` takes requirement units that anchor to NO declared
  # operation (the same deterministic detection requirement_reconciliation uses)
  # and asks the project's resolved AI command to propose operation_flow entries
  # (id/actor/verb/target/expected_outcomes). Proposals are written to
  # <codd-dir>/operations_proposal.yaml for human review; nothing is written to
  # codd.yaml until `codd operations approve` + `codd operations merge`. This
  # section is reserved for future tuning; all commands work with it absent, and
  # uncovered-unit detection reuses the requirement_reconciliation settings
  # above (docs / sections / out_of_scope_markers).
  enabled: false
dependency_freshness:
  # Doc-to-doc depends_on freshness backed by the reconciliation ledger
  # (<codd-dir>/reconciliation_ledger.json, written by `codd propagate --commit`).
  # The ledger is the primary mechanism. Default is an amber advisory in
  # `codd dag verify` (exit code unchanged); opt in to hard-gating with
  # severity: red. Without a ledger entry for an edge the check falls back to
  # a commit-recency heuristic — best-effort onboarding triage, not proof of
  # freshness: a joint tip commit (both docs touched together) is
  # disambiguated via exclusive-commit history, but repeated bulk commits can
  # still mask drift. The missing baseline is always reported explicitly.
  # NOTE: projects whose codd.yaml pins dag.enabled_checks must add
  # `dependency_freshness` to that list (codd dag verify prints a notice
  # listing registered-but-unselected checks).
  enabled: true
  severity: amber
artifact_contract:
  # Per-project, OPT-IN contract mapping pipeline stages to the catalog
  # artifact ids each stage MUST produce. Each stage declares its required
  # artifacts from the shipped core artifact catalog (codd/artifacts/catalog.yaml);
  # `codd contract verify` (and the `artifact_contract` dag check) then check
  # they exist and pass their validator. Absent/`enabled: false` = no behavior
  # change; existing projects are unaffected. The dag check is dormant unless
  # enabled, and defaults to an amber advisory (set severity: red to hard-gate).
  # NOTE: projects whose codd.yaml pins dag.enabled_checks must add
  # `artifact_contract` to that list (codd dag verify prints a notice listing
  # registered-but-unselected checks).
  enabled: false
  severity: amber
  stages: {}
enables_nudge:
  # Doctor advisory: an operation whose visible_to/expected_outcomes mention
  # another declared actor but that declares no `enables` relationship gets a
  # nudge to consider declaring one (observation vs capability-granting).
  enabled: true
greenfield:
  # `codd greenfield` — the unattended autopilot: write a requirements
  # document; CoDD plans waves, generates design docs, implements every task,
  # verifies with automatic repair, propagates, and runs the final health
  # check. All gates are auto-approved; checkpoints land in
  # .codd/greenfield_session.yaml (resume with `codd greenfield --resume`).
  # CLI flags override these per run.
  elicit: true              # run the advisory elicit+apply stage (never blocking)
  max_repair_attempts: 10   # automatic repair attempts during the verify stage
  coverage_gate: true       # enforce the verifiable-behavior gate per implement task
  ntfy_topic: ""            # ntfy topic/URL for progress pings (empty = off; notify-only)
  propagate_commit: true    # run propagate --verify/--commit (advisory on a fresh build)
  chunk_size: null          # run implement steps in chunks of N (null = single run)
  timeout_per_chunk: 600    # seconds per chunk when chunk_size is set
