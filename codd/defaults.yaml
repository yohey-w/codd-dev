version: "0.2.0a1"
codd_required_version: null
codd_required_version_strict: false
project:
  frameworks: []
ai_command: "claude --print --permission-mode bypassPermissions --dangerously-skip-permissions --model claude-opus-4-8 --effort max --tools \"\""
ai_commands:
  plan_derive: null
  design_doc_extract: null
  criteria_expand: null
coding_principles: null
scan:
  source_dirs:
    - "src/"
  test_dirs:
    - "tests/"
  doc_dirs:
    - "docs/"
  config_files: []
  exclude:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/dist/**"
graph:
  store: "jsonl"
  path: "codd/scan"
bands:
  green:
    min_confidence: 0.90
    min_evidence_count: 2
  amber:
    min_confidence: 0.50
propagation:
  max_depth: 10
  stop_at_contract_boundary: true
coherence:
  capability_patterns: {}
  path_prefix_tolerant:
    - "src/"
    - "lib/"
    - "app/"
hitl:
  mode: cooperative
requirement_completeness:
  project_type: null
  channels:
    - askuserquestion
    - ntfy
    - lexicon
  ntfy_topic: ""
  questions: []
  ai_missing_items: false
  semantic_check: false
  ai_generate_options: false
  ai_timeout_seconds: 30
fix:
  test_command: null  # auto-detected from package.json / pyproject.toml
  max_attempts: 3
verify:
  typecheck_command: null
  test_command: null
  report_output: "docs/test/verify_report.md"
  e2e_setup_command: null  # e.g. "npx playwright install chromium"
  e2e_command: null         # all E2E tests
  e2e_deploy_command: null  # deploy/CDP-only tests (e.g. @cdp-only)
  e2e_ci_command: null      # CI-safe tests (excludes CDP-only)
runtime:
  crud_flow_targets: []
  action_outcome_targets: []
typecheck:
  enabled: false
  command: null
  max_repair_attempts: 3
conventions: []
extraction:
  frontmatter_alias: {}
# Advisory doctor checks (non-fatal). Both default-enabled; opt out per project.
surface_reconciliation:
  # Flag actor-facing interactive/authoring surfaces in source (literal <button>
  # mutating controls + generic contenteditable/role=textbox editors) whose
  # capability is not declared in any operation_flow and not covered by a runtime
  # action outcome target. Set enabled:false to silence; extend authoring_verbs
  # with non-English/custom control labels.
  enabled: true
  authoring_verbs: []
orphan_cover_markers:
  # Flag `codd: covers operation=X` test markers whose operation X is not declared
  # in any operation_flow (reverse reconciliation of the audit covers path).
  enabled: true
dependency_freshness:
  # Doc-to-doc depends_on freshness backed by the reconciliation ledger
  # (<codd-dir>/reconciliation_ledger.json, written by `codd propagate --commit`).
  # The ledger is the primary mechanism. Default is an amber advisory in
  # `codd dag verify` (exit code unchanged); opt in to hard-gating with
  # severity: red. Without a ledger entry for an edge the check falls back to
  # a commit-recency heuristic — best-effort onboarding triage, not proof of
  # freshness: a joint tip commit (both docs touched together) is
  # disambiguated via exclusive-commit history, but repeated bulk commits can
  # still mask drift. The missing baseline is always reported explicitly.
  # NOTE: projects whose codd.yaml pins dag.enabled_checks must add
  # `dependency_freshness` to that list (codd dag verify prints a notice
  # listing registered-but-unselected checks).
  enabled: true
  severity: amber
enables_nudge:
  # Doctor advisory: an operation whose visible_to/expected_outcomes mention
  # another declared actor but that declares no `enables` relationship gets a
  # nudge to consider declaring one (observation vs capability-granting).
  enabled: true
