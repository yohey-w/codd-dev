# C# language profile (design §1.2–1.9, §5.1), modeled on go.yaml.
#
# Phase 1: declarative data only — the implement-oracle (dotnet-toolchain) +
# runner-report (dotnet-trx) adapters are registered centrally by the parent, not
# here. Auto-discovered by LanguageRegistry (profiles/*.yaml keyed on id).
#
# Load-bearing decisions (asserted by tests/languages/test_profile_csharp.py):
#   * module_root = "."   — the project/solution lives at the repo root.
#   * source_sets = src/**/*.cs (first-party source under a representable `src` root).
#   * test_sets   = tests/**/*.cs (a representable xUnit/NUnit/MSTest convention).
#   * package_root.kind = none — C# has NO single package root in the Go sense.
#   * strictness  = strict — a new language is strict from day one.
#   * implement_oracle = composite (build), adapter dotnet-toolchain.
#   * verify report adapter = dotnet-trx (VSTest TRX).
#
# C# does NOT use Go's no-src/ invariant: there is NO forbidden_generated_prefixes
# ["src/"] here — a `src` root is a perfectly conventional C# source location.
#
# manifest.path is consumed loosely (the certifier globs *.csproj/*.sln); a literal
# glob value `*.csproj` is an acceptable DECLARED manifest pattern in Phase 1.
# Placeholders ({module_root}, {package_name}, ...) are LITERAL template strings.

id: csharp
aliases: ["c#", "cs", "dotnet"]
display_name: "C#"
strictness: strict
file_extensions: [".cs"]

# Greenfield ② OPT-IN (data-driven; the language-free core authorizes the generic
# LayoutProfile synthesizer + the generic-template scaffolder by the PRESENCE of this
# key, never by a language name). C# is the first non-Python stack to opt in. Go/Java/C++
# do NOT declare it — Go in particular keeps its existing NO-OP scaffold path (its
# scaffold.adapter is generic-template too) and stays excluded by this opt-in, preserving
# test_unknown_stack_is_noop. Preserved verbatim under LanguageProfile.extra by the loader.
greenfield_synthesis: true

layout:
  repo_root: "."
  module_root: "."
  manifest_root: "."
  default_command_cwd: "{module_root}"

  package_root:
    kind: none

  source_sets:
    - id: src
      role: first_party
      root: "src"
      file_globs:
        - "src/**/*.cs"

  test_sets:
    - id: tests
      role: unit
      root: "tests"
      file_globs:
        - "tests/**/*.cs"

# Preserved verbatim (modeled as profile.extra in Phase 1). NOTE: unlike go.yaml
# there is intentionally NO forbidden_generated_prefixes ["src/"] — the no-src/
# invariant is Go-specific; `src` is a conventional C# source root.
path_rules:
  canonical_path_base: repo_root
  path_separator: "/"

  output_roles:
    project_manifest:
      owner: harness
      path: "*.csproj"

    source_file:
      owner: sut
      template: "src/{name}.cs"

    test_file:
      owner: sut
      template: "tests/{name}Tests.cs"

toolchain:
  manifest:
    # Consumed loosely in Phase 1 (the dotnet-toolchain certifier globs
    # *.csproj/*.sln); a glob pattern is an acceptable declared manifest value.
    path: "*.csproj"
    format: msbuild-csproj
    required: true

  module_identity:
    source: manifest
    # The assembly/root namespace; loosely declared (read by an adapter later).
    path: "*.csproj"
    field: "AssemblyName"
    default_template: "{package_name}"

  package_manager:
    id: dotnet
    materialize_command:
      argv: ["dotnet", "restore"]
      cwd: "{module_root}"
      network_policy: controlled
    reconcile_command:
      argv: ["dotnet", "restore"]
      cwd: "{module_root}"

imports:
  resolver_adapter: dotnet-using

  first_party:
    rule: root_namespace_prefix
    base: "src"

  stdlib:
    classifier: adapter

commands:
  build:
    argv: ["dotnet", "build", "-c", "Release"]
    cwd: "{module_root}"
    # The dotnet implement-oracle's build step does NOT require a separate
    # materialization preflight: `dotnet build` restores implicitly, and the
    # dotnet-toolchain adapter tolerates restore banners as benign noise. false here
    # (mirrors Go's typecheck): the contract oracle consumes this flag, so a stale
    # `true` would wrongly trigger an install preflight for the oracle command.
    requires_materialized_deps: false
    scope:
      must_include_source_sets: ["src"]

  verify:
    # `dotnet test` (no project arg, cwd={module_root}=repo root) auto-discovers the single
    # root `.sln` the scaffold writes and runs the WHOLE test surface across it. Two flags are
    # load-bearing:
    #   * `--logger "trx;LogFileName=test.trx"` emits the VSTest TRX. The synthesized campaign
    #     runs this argv with shell=False, so the `;` is passed VERBATIM (never shell-split).
    #   * `--results-directory TestResults` forces the SINGLE .trx to the ROOT-level
    #     TestResults/ (= verify.report.path). WITHOUT it, a SOLUTION `dotnet test` writes a
    #     PER-TEST-PROJECT TestResults/ (tests/<pkg>.Tests/TestResults/test.trx) and the
    #     campaign would find NO report at the declared path. Verified with real dotnet 8.
    # YAML is the SSOT for the campaign command — the harness reads this argv at real-run time.
    argv: ["dotnet", "test", "--logger", "trx;LogFileName=test.trx", "--results-directory", "TestResults"]
    cwd: "{module_root}"
    report:
      capture: stdout
      path: "TestResults/test.trx"
      format: dotnet-trx
      adapter: dotnet-trx
    scope:
      must_include_test_sets: ["tests"]

# Implement-time oracle (Contract Kernel §1): a composite whose single step is the
# build command, resolved by the dotnet-toolchain adapter. References command ids only.
implement_oracle:
  kind: composite
  adapter: dotnet-toolchain
  steps:
    - command: build

tests:
  semantics_adapter: csharp-test-semantics
  runner_report_adapter: dotnet-trx

  test_file_globs:
    - "tests/**/*.cs"

  authenticity_policy:
    marker_must_be_inside_executable_test_block: true
    skipped_is_not_authentic: true
    focused_only_is_not_authentic: true
    assertion_required: true
    accepted_assertion_confidence: ["certain"]

  assertion_hints:
    libraries:
      - import_path: "Xunit"
        functions:
          - Assert.Equal
          - Assert.True
          - Assert.False
          - Assert.Throws
          - Assert.NotNull
      - import_path: "NUnit.Framework"
        functions:
          - Assert.That
          - Assert.AreEqual
          - Assert.IsTrue
      - import_path: "Microsoft.VisualStudio.TestTools.UnitTesting"
        functions:
          - Assert.AreEqual
          - Assert.IsTrue
          - Assert.IsNotNull

verify:
  command: verify
  report:
    path: "TestResults/test.trx"
    format: dotnet-trx
    adapter: dotnet-trx

  execution_policy:
    every_vb_test_block_must_execute: true
    every_vb_test_block_must_pass: true
    skipped_is_not_green: true
    missing_from_report_is_not_green: true

scaffold:
  adapter: generic-template

  # Greenfield ② Option C — the IDIOMATIC C# topology, declared as per-language DATA so the
  # language-free generic-template scaffolder writes it with NO new code abstraction (no
  # `language ==` branch). The single-project model (one .csproj that builds+tests green but
  # bakes xunit into the shipped assembly's *.deps.json) is a FALSE GREEN; the only way C#
  # produces a PURE deliverable is the conventional separation of a 0-package LIBRARY project
  # from a SEPARATE xunit TEST project, tied by a .sln. The library is then PHYSICALLY unable
  # to carry the test packages — purity is structurally enforced, not prompt-enforced.
  owned_files:
    - "src/{package_name}/{package_name}.csproj"
    - "tests/{package_name}.Tests/{package_name}.Tests.csproj"
    - "{package_name}.sln"

  # Default values for the template substitution variables (consumed by the generic-
  # template scaffolder). {package_name} comes from the resolved LayoutProfile and always
  # wins over a default; other vars fall back to these. A TFM / package-version bump is a
  # DATA edit here, never a template/code edit.
  defaults:
    target_framework: "net8.0"
    test_sdk_version: "17.11.1"
    xunit_version: "2.9.2"
    xunit_runner_version: "2.8.2"

  # Three templates realize Option C. Substitution is REPLACE-based ({package_name} →
  # value), so the literal braces in XML and in the .sln GUIDs are passed VERBATIM (str.format
  # would raise on a GUID like {9A19103F-...}). Paths sit UNDER source_root=src / test_root=
  # tests (consistent with the layout the synthesizer reads — the roots are the parents).
  templates:
    # (1) LIBRARY project — the deliverable. ZERO PackageReference (anti-false-green: a test
    # package here would leak into <pkg>.deps.json). Lives at src/{pkg}/ so the SDK's implicit
    # `**/*.cs` compile glob (project-dir-relative) captures the SUT's src/{pkg}/*.cs sources.
    - path: "src/{package_name}/{package_name}.csproj"
      content_template: |
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>{target_framework}</TargetFramework>
            <Nullable>enable</Nullable>
            <ImplicitUsings>enable</ImplicitUsings>
          </PropertyGroup>
        </Project>
    # (2) TEST project — carries the xunit/test SDK packages AND a ProjectReference back to
    # the library. IsPackable=false (a test project is never a shipped package).
    - path: "tests/{package_name}.Tests/{package_name}.Tests.csproj"
      content_template: |
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>{target_framework}</TargetFramework>
            <Nullable>enable</Nullable>
            <ImplicitUsings>enable</ImplicitUsings>
            <IsPackable>false</IsPackable>
          </PropertyGroup>
          <ItemGroup>
            <PackageReference Include="Microsoft.NET.Test.Sdk" Version="{test_sdk_version}" />
            <PackageReference Include="xunit" Version="{xunit_version}" />
            <PackageReference Include="xunit.runner.visualstudio" Version="{xunit_runner_version}" />
          </ItemGroup>
          <ItemGroup>
            <ProjectReference Include="../../src/{package_name}/{package_name}.csproj" />
          </ItemGroup>
        </Project>
    # (3) SOLUTION — ties lib + test so a single root `dotnet test` resolves the whole VB
    # surface. GUIDs are STATIC/deterministic (a fixed-string scaffold is reproducible; the
    # .NET-SDK project-type GUID 9A19103F… + one fixed GUID per project). Space-indented (the
    # dotnet sln parser accepts spaces; keeps this a clean YAML literal block, no tabs).
    - path: "{package_name}.sln"
      content_template: |
        Microsoft Visual Studio Solution File, Format Version 12.00
        # Visual Studio Version 17
        VisualStudioVersion = 17.0.31903.59
        MinimumVisualStudioVersion = 10.0.40219.1
        Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "{package_name}", "src/{package_name}/{package_name}.csproj", "{11111111-1111-1111-1111-111111111111}"
        EndProject
        Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "{package_name}.Tests", "tests/{package_name}.Tests/{package_name}.Tests.csproj", "{22222222-2222-2222-2222-222222222222}"
        EndProject
        Global
            GlobalSection(SolutionConfigurationPlatforms) = preSolution
                Debug|Any CPU = Debug|Any CPU
                Release|Any CPU = Release|Any CPU
            EndGlobalSection
            GlobalSection(ProjectConfigurationPlatforms) = postSolution
                {11111111-1111-1111-1111-111111111111}.Debug|Any CPU.ActiveCfg = Debug|Any CPU
                {11111111-1111-1111-1111-111111111111}.Debug|Any CPU.Build.0 = Debug|Any CPU
                {11111111-1111-1111-1111-111111111111}.Release|Any CPU.ActiveCfg = Release|Any CPU
                {11111111-1111-1111-1111-111111111111}.Release|Any CPU.Build.0 = Release|Any CPU
                {22222222-2222-2222-2222-222222222222}.Debug|Any CPU.ActiveCfg = Debug|Any CPU
                {22222222-2222-2222-2222-222222222222}.Debug|Any CPU.Build.0 = Debug|Any CPU
                {22222222-2222-2222-2222-222222222222}.Release|Any CPU.ActiveCfg = Release|Any CPU
                {22222222-2222-2222-2222-222222222222}.Release|Any CPU.Build.0 = Release|Any CPU
            EndGlobalSection
            GlobalSection(SolutionProperties) = preSolution
                HideSolutionNode = FALSE
            EndGlobalSection
        EndGlobal

artifacts:
  harness_root: ".codd"

  harness_owned:
    - ".codd/**"
    - "src/{package_name}/{package_name}.csproj"
    - "tests/{package_name}.Tests/{package_name}.Tests.csproj"
    - "{package_name}.sln"

  ignored:
    - "bin/**"
    - "obj/**"
    - "TestResults/**"

# CI scaffold (design §v2.70): toolchain bootstrap for a generated CI workflow.
ci:
  setup_steps:
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"
