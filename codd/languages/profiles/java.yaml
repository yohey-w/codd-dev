# Java language profile (design §1.2–1.9, §5.1) — modeled on go.yaml.
#
# Load-bearing invariants (asserted by tests/languages/test_profile_java.py):
#   * module_root = "."   — pom.xml lives at the repo root.
#   * source_sets = src/main/java/** (Maven's standard main source root).
#   * test_sets   = src/test/java/** (Maven's standard test source root).
#   * package_root.kind = none — Java has no single package root in the Go sense.
#   * strictness  = strict — a new language is strict from day one.
#   * implement_oracle kind=composite, adapter=java-toolchain, step=[compile].
#   * verify report adapter = surefire-xml (Maven Surefire XML).
#
# NOTE on src/: Java legitimately uses ``src/main/java`` + ``src/test/java`` —
# this is Maven's standard directory layout, NOT the forbidden bare ``src/`` of the
# Go no-src invariant (that invariant is Go-specific). So NO
# forbidden_generated_prefixes: ["src/"] here.
#
# Placeholders ({package_name}, {java_version}, ...) are LITERAL template strings
# in Phase 1 — substitution is PathPlanner's job later.

id: java
aliases: ["jvm"]
display_name: "Java"
strictness: strict
file_extensions: [".java"]

# Greenfield ② OPT-IN (data-driven; the language-free core authorizes the generic
# LayoutProfile synthesizer + the generic-template scaffolder by the PRESENCE of this
# key, never by a language name — same opt-in mechanism C# uses). Java's
# package_root.kind=none (flat layout) needs no nested-dir scheme: the synthesizer
# already handles none|path_root as package_root == source_root.
greenfield_synthesis: true

layout:
  repo_root: "."
  module_root: "."
  manifest_root: "."
  default_command_cwd: "{module_root}"

  package_root:
    kind: none

  source_sets:
    - id: main
      role: first_party
      root: "src/main/java"
      file_globs:
        - "src/main/java/**/*.java"

  test_sets:
    - id: unit
      role: unit
      root: "src/test/java"
      file_globs:
        - "src/test/java/**/*.java"

# Preserved verbatim (modeled as profile.extra in Phase 1).
path_rules:
  canonical_path_base: repo_root
  path_separator: "/"

  output_roles:
    module_manifest:
      owner: harness
      path: "pom.xml"

    main_source_file:
      owner: sut
      template: "src/main/java/{package_path}/{name}.java"

    test_source_file:
      owner: sut
      template: "src/test/java/{package_path}/{name}Test.java"

toolchain:
  manifest:
    path: "pom.xml"
    format: pom.xml
    required: true

  module_identity:
    source: manifest
    path: "pom.xml"
    field: "artifactId"
    default_template: "{package_name}"

  package_manager:
    id: maven
    materialize_command:
      argv: ["mvn", "-q", "dependency:resolve"]
      cwd: "{module_root}"
      network_policy: controlled
    reconcile_command:
      argv: ["mvn", "-q", "versions:use-latest-versions"]
      cwd: "{module_root}"
      mutates:
        - "pom.xml"
    frozen_mode:
      argv_flags: ["-o"]

imports:
  resolver_adapter: java-package

  first_party:
    rule: source_root_package
    source_root: "src/main/java"

  stdlib:
    classifier: adapter

commands:
  compile:
    argv: ["mvn", "-q", "-e", "compile"]
    cwd: "{module_root}"
    # The Java implement-oracle ``compile`` step is the implement-time coherence
    # gate (javac via maven-compiler). It must NOT force the contract install
    # preflight: maven resolves its own classpath, so a separate ``dependency:resolve``
    # before the oracle is not required (mirrors Go's typecheck ``requires_materialized_deps:
    # false``). A stale ``true`` would wrongly trigger the preflight for Java.
    requires_materialized_deps: false
    scope:
      must_include_source_sets: ["main"]

  verify:
    # ``mvn verify`` (not ``test``): the Maven lifecycle phase that ALSO runs the
    # Failsafe plugin's integration-test/verify goals declared below on
    # ``tests/e2e/java/**`` — ``mvn test`` alone never reaches those goals, so the
    # e2e/IT layer never ran regardless of how well its report was read (this
    # ARGV change is the live half of the Surefire/Failsafe coherence-execution
    # fix; the top-level ``verify.reports`` below, read by the coverage-execution
    # coherence campaign, is the other half). This is ONE invocation writing TWO
    # report roots, not two invocations — see ``verify.reports``.
    argv: ["mvn", "-q", "verify"]
    cwd: "{module_root}"
    report:
      capture: none
      path: "target/surefire-reports"
      format: surefire-xml
      adapter: surefire-xml
    scope:
      must_include_test_sets: ["unit"]

# Implement-time oracle (Contract Kernel §1): the ``compile`` command, resolved by
# the java-toolchain adapter. References command ids only.
implement_oracle:
  kind: composite
  adapter: java-toolchain
  steps:
    - command: compile

tests:
  semantics_adapter: java-junit-semantics
  runner_report_adapter: surefire-xml

  test_file_globs:
    - "src/test/java/**/*.java"

  # Generation/implement ground truth (see typescript.yaml's ``tests.framework``
  # for the motivating incident and the field's contract). The scaffold
  # template below materializes ``junit-jupiter`` as the ONLY test dependency
  # (test-scoped in pom.xml) — JUnit 5 is not a menu option here, it is what
  # actually gets installed and what Surefire/Failsafe actually execute.
  framework:
    name: "JUnit 5 (Jupiter)"
    example: |
      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.assertThrows;

      class TokenizerTest {
          @Test
          void rejectsUnrecognizedCharacter() {
              assertThrows(LexicalException.class, () -> Tokenizer.tokenize("$"));
          }
      }

  authenticity_policy:
    marker_must_be_inside_executable_test_block: true
    skipped_is_not_authentic: true
    focused_only_is_not_authentic: true
    assertion_required: true
    # "certain" (a direct primitive, or a resolved helper whose body asserts and
    # is argument-anchored) stays accepted unconditionally. "declared" is added
    # for the library fluent-terminal mechanism below (assertion_hints.
    # library_assertion_terminals) — a call credited off DECLARED metadata (the
    # test file imports the library AND the leaf method is a declared terminal
    # AND the call/receiver argument-anchors) rather than a resolved body. Widen
    # this list only when a NEW confidence tier is introduced; never remove
    # "certain".
    accepted_assertion_confidence: ["certain", "declared"]

  test_block_kinds:
    - junit_test_method

  assertion_hints:
    junit_jupiter:
      import_path: "org.junit.jupiter.api"
      assertion_methods:
        - assertEquals
        - assertTrue
        - assertFalse
        - assertNotNull
        - assertNull
        - assertThrows
        - assertSame
        - assertArrayEquals
      annotation_methods:
        - Test
      skip_annotations:
        - Disabled
      # Qualified-call entry points: a call shaped ``<EntryClass>.<assertMethod>(``
      # (e.g. ``Assertions.assertEquals(expected, actual)`` with only a PLAIN
      # ``import org.junit.jupiter.api.Assertions;`` — no static import) is a
      # DIRECT primitive assertion, not an unresolved helper call. The qualifier
      # must be one of these declared names — this is DATA the qualified-call
      # matcher is built from, never a hardcoded class name.
      entry_classes:
        - Assertions

    # Fluent LIBRARY TERMINALS (design "the fluent-terminal problem"): a call is
    # credited as assertion evidence when (a) the test file imports a path under
    # one of these ``import_path`` prefixes, (b) the call's leaf name is in that
    # entry's ``methods``, and (c) the call (or its receiver chain) argument-
    # anchors to a non-ignored name — see ``_java_library_terminal_evidence``.
    # ArchUnit's fluent architecture rules terminate in ``.check(classes)``
    # (``noClasses().that()...should()...check(classes)``); the rule chain
    # itself asserts nothing until ``.check(...)`` runs it, so without this
    # declared-terminal mechanism every ArchUnit test looks like an unresolved
    # helper call to the authenticity gate. Credited evidence carries
    # ``confidence: "declared"`` (see ``accepted_assertion_confidence`` above).
    library_assertion_terminals:
      - import_path: "com.tngtech.archunit"
        methods:
          - check

verify:
  command: verify
  # TWO report roots from ONE ``mvn verify`` invocation (see ``commands.verify``
  # above): Surefire writes unit-test results to ``target/surefire-reports``;
  # Failsafe writes integration-test (``*IT``) results to
  # ``target/failsafe-reports`` — the SAME ``TEST-<class>.xml`` schema, so both
  # declare the identical ``surefire-xml`` adapter (never a second parser to
  # write). ``failsafe-reports`` is ``optional: true``: Maven's Failsafe plugin
  # ALWAYS writes a ``target/failsafe-reports/failsafe-summary.xml`` even when a
  # project declares ZERO ``*IT`` classes (confirmed empirically) — a real,
  # non-empty file that is not a ``<testsuite>`` document, not a genuinely
  # absent directory. ``optional`` tolerates exactly that shape (see
  # ``run_verify_campaign``) so a legitimately unit-only Java project is not
  # hard-failed for having no integration-test layer; whether an e2e surface
  # that NEEDED this evidence actually exists is decided downstream by the
  # coverage-execution coherence gate's reconciliation, never by this flag.
  reports:
    - path: "target/surefire-reports"
      format: surefire-xml
      adapter: surefire-xml
    - path: "target/failsafe-reports"
      format: surefire-xml
      adapter: surefire-xml
      optional: true

  execution_policy:
    every_vb_test_block_must_execute: true
    every_vb_test_block_must_pass: true
    skipped_is_not_green: true
    missing_from_report_is_not_green: true

scaffold:
  adapter: generic-template
  owned_files:
    - "pom.xml"

  # Default values for the template substitution variables (consumed by the generic-
  # template scaffolder, replace-based — mirrors csharp.yaml's `defaults` block).
  # {package_name} comes from the resolved LayoutProfile and always wins over a
  # default; a version bump is a DATA edit here, never a template/code edit.
  defaults:
    group_id: "org.example"
    java_version: "21"
    junit_jupiter_version: "5.11.0"
    surefire_plugin_version: "3.2.5"
    # Failsafe is released in lockstep with Surefire by the Apache Maven team
    # (same versioning scheme) — reusing {surefire_plugin_version} rather than a
    # second, independently-tracked default avoids two version knobs for one pair.
    compiler_plugin_version: "3.13.0"
    build_helper_plugin_version: "3.6.0"

  templates:
    # Single pom.xml: Java's package_root.kind=none means there is no C#-style
    # nested lib/test project split to enforce deliverable purity. Maven's own
    # <scope>test</scope> is the structural purity mechanism here — a test-scoped
    # dependency is excluded from the compile/runtime classpath of consumers and
    # from the packaged jar by Maven's own dependency resolution, so a single pom
    # with junit-jupiter scoped to test is anti-false-green-safe without a second
    # project (unlike the .NET SDK, which has no built-in test/lib project split).
    #
    # The build-helper + compiler-plugin + failsafe wiring below (added alongside
    # the Surefire/Failsafe coverage-execution-coherence fix) gives every
    # generated Java project a SECOND test source root, ``tests/e2e/java`` —
    # Go-parallel (mirrors go.yaml's ``tests/e2e/*_test.go`` e2e set) — compiled
    # and run by Failsafe's ``integration-test``/``verify`` goals as part of the
    # SAME ``mvn verify`` invocation ``commands.verify`` runs. Without an EXPLICIT
    # ``maven-compiler-plugin`` version, some default-bundled compiler-plugin
    # versions reject a modern ``<release>`` value ("Source option 5 is no longer
    # supported") — pinning the version here is what makes the release property
    # actually take effect (confirmed via a throwaway Maven project during this
    # change).
    - path: "pom.xml"
      content_template: |
        <project xmlns="http://maven.apache.org/POM/4.0.0">
          <modelVersion>4.0.0</modelVersion>
          <groupId>{group_id}</groupId>
          <artifactId>{package_name}</artifactId>
          <version>0.1.0</version>
          <properties>
            <maven.compiler.release>{java_version}</maven.compiler.release>
          </properties>
          <dependencies>
            <dependency>
              <groupId>org.junit.jupiter</groupId>
              <artifactId>junit-jupiter</artifactId>
              <version>{junit_jupiter_version}</version>
              <scope>test</scope>
            </dependency>
          </dependencies>
          <build>
            <plugins>
              <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-compiler-plugin</artifactId>
                <version>{compiler_plugin_version}</version>
                <configuration>
                  <release>{java_version}</release>
                </configuration>
                <executions>
                  <execution>
                    <id>default-testCompile</id>
                    <configuration>
                      <useModulePath>false</useModulePath>
                    </configuration>
                  </execution>
                  <execution>
                    <id>e2e-testCompile</id>
                    <phase>generate-test-sources</phase>
                    <goals>
                      <goal>testCompile</goal>
                    </goals>
                    <configuration>
                      <useModulePath>false</useModulePath>
                    </configuration>
                  </execution>
                </executions>
              </plugin>
              <plugin>
                <groupId>org.codehaus.mojo</groupId>
                <artifactId>build-helper-maven-plugin</artifactId>
                <version>{build_helper_plugin_version}</version>
                <executions>
                  <execution>
                    <id>add-e2e-test-source</id>
                    <phase>generate-test-sources</phase>
                    <goals>
                      <goal>add-test-source</goal>
                    </goals>
                    <configuration>
                      <sources>
                        <source>tests/e2e/java</source>
                      </sources>
                    </configuration>
                  </execution>
                </executions>
              </plugin>
              <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-surefire-plugin</artifactId>
                <version>{surefire_plugin_version}</version>
              </plugin>
              <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-failsafe-plugin</artifactId>
                <version>{surefire_plugin_version}</version>
                <executions>
                  <execution>
                    <goals>
                      <goal>integration-test</goal>
                      <goal>verify</goal>
                    </goals>
                  </execution>
                </executions>
              </plugin>
            </plugins>
          </build>
        </project>

artifacts:
  harness_root: ".codd"

  harness_owned:
    - ".codd/**"
    - "pom.xml"

  build_outputs:
    default_dir: "target"
    orphan_policy: harness_owned

  ignored:
    - "target/"
    - "*.class"

# CI scaffold (design §v2.70): toolchain bootstrap for a generated CI workflow.
ci:
  setup_steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
