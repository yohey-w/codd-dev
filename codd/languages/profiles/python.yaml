# Python language profile (design §1.2, §7).
#
# Phase 1: declarative data only — NOT wired into any gate yet. This is the
# compatibility profile that mirrors CoDD's *existing* Python layout, so the
# eventual rewire keeps the current snapshot.
#
# Invariants (asserted by tests):
#   * source_sets root  = src/{package_name}  (RETAINS the src/ layout).
#   * test_sets root    = tests.
#   * package_root.kind = named_package, path = src/{package_name}.
#   * strictness        = legacy_compatible (staged migration; do not break).
#   * manifest          = pyproject.toml.
#
# {package_name} is a LITERAL placeholder in Phase 1 (PathPlanner substitutes later).

id: python
aliases: ["py", "python3"]
display_name: "Python"
strictness: legacy_compatible
file_extensions: [".py"]

layout:
  repo_root: "."
  module_root: "."
  manifest_root: "."
  default_command_cwd: "{module_root}"

  package_root:
    kind: named_package
    path: "src/{package_name}"

  source_sets:
    - id: package
      role: first_party
      root: "src/{package_name}"
      file_globs:
        - "src/{package_name}/**/*.py"

  test_sets:
    - id: tests
      role: unit
      root: "tests"
      file_globs:
        - "tests/**/*.py"

toolchain:
  manifest:
    path: "pyproject.toml"
    format: pyproject.toml
    required: true

  module_identity:
    source: manifest
    path: "pyproject.toml"
    field: "project.name"

  dependency_integrity_files:
    - path: "uv.lock"
      kind: lock
      required: false
    - path: "poetry.lock"
      kind: lock
      required: false

  package_manager:
    id: pip
    frozen_mode: {}

imports:
  resolver_adapter: python-package

  first_party:
    rule: package_name
    package_name: "{package_name}"

  stdlib:
    classifier: adapter

commands:
  test:
    argv: ["python", "-m", "pytest", "tests"]
    cwd: "{module_root}"

  verify:
    argv:
      - "python"
      - "-m"
      - "pytest"
      - "tests"
      - "--junitxml=.codd/verify/pytest-junit.xml"
    cwd: "{module_root}"
    report:
      path: ".codd/verify/pytest-junit.xml"
      format: junit-xml
      adapter: pytest-junit-xml

# Implement-time oracle (Contract Kernel §1): Python's compile + import-resolver
# + collect-only composite is an in-process custom executor, so kind=adapter.
implement_oracle:
  kind: adapter
  adapter: python-composite

tests:
  semantics_adapter: python-test-semantics
  runner_report_adapter: pytest-junit-xml

  test_file_globs:
    - "tests/**/*.py"

  # Generation/implement ground truth (see typescript.yaml's ``tests.framework``
  # for the motivating incident). Python is comparatively low-risk here since
  # pytest also collects plain ``assert``-based functions with no import at
  # all, but declaring the actual framework explicitly keeps this profile
  # consistent with every other profile and gives defense-in-depth against an
  # AI defaulting to a different stdlib idiom (e.g. unittest.TestCase) that a
  # design doc's own conventions did not intend.
  framework:
    name: pytest
    example: |
      import pytest

      def test_rejects_unrecognized_character():
          with pytest.raises(LexicalError):
              tokenize("$")

  authenticity_policy:
    marker_must_be_inside_executable_test_block: true
    skipped_is_not_authentic: true
    focused_only_is_not_authentic: true
    assertion_required: true

  assertion_hints:
    primitive:
      - assert
    libraries:
      - import_path: "pytest"
        functions:
          - raises
          - approx

verify:
  command: verify
  report:
    path: ".codd/verify/pytest-junit.xml"
    format: junit-xml
    adapter: pytest-junit-xml

  execution_policy:
    every_vb_test_block_must_execute: true
    every_vb_test_block_must_pass: true
    skipped_is_not_green: true
    missing_from_report_is_not_green: true

scaffold:
  adapter: generic-template
  owned_files:
    - "pyproject.toml"
    - "src/{package_name}/__init__.py"
    - "src/{package_name}/__main__.py"
    - "tests/__init__.py"

# Legacy project-types bridge (Contract Kernel v2.71): the declarative seam that
# lets the language-free core route the LEGACY codd.project_types builders /
# scaffolder / test-runner ensurer WITHOUT a language-name literal in core code.
#   * accepted_names — the EXACT set of runtime language names the legacy
#     ``resolve_layout_profile`` / ``ensure_test_runner_config`` accept for this
#     stack (preserves byte-identical support: Python accepts only ``python``,
#     NOT every registry alias like ``py``/``python3``). Language names live in
#     the PROFILE (an allowed zone), never in core .py.
#   * realizer ids — HARNESS-POLICY capability names (not language names) the core
#     maps to the concrete legacy builder/scaffolder/ensurer. They carry the
#     runner/install/oracle/toolchain/verify POLICY the YAML does not yet model
#     (that full externalization is the v3.0.0 gate; this increment only removes
#     the language-name DISPATCH).
legacy_project_types:
  accepted_names: ["python"]
  layout_builder: "src-package-pytest-editable-layout-v1"
  scaffolder: "pyproject-src-package-scaffold-v1"
  test_runner_ensurer: "pyproject-pytest-runner-v1"

artifacts:
  harness_root: ".codd"

  harness_owned:
    - ".codd/**"
    - "pyproject.toml"

  ignored:
    - ".pytest_cache/**"
    - "*.pyc"

# CI scaffold (design §v2.70): toolchain bootstrap for a generated CI workflow.
ci:
  setup_steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - run: python -m pip install --upgrade pip && pip install -e .
