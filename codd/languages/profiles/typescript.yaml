# TypeScript language profile (design §1.2, §7).
#
# Phase 1: declarative data only — NOT wired into any gate yet. Compatibility
# profile mirroring CoDD's existing TS layout.
#
# Invariants (asserted by tests):
#   * source_sets root  = src  (RETAINS the src/ layout).
#   * test_sets root    = tests, globs **/*.test.ts + **/*.spec.ts.
#   * package_root.kind = path_root, path = src.
#   * strictness        = legacy_compatible.
#   * manifest          = package.json; lock = package-lock.json.
#
# {report} / {test_root} are LITERAL placeholders in Phase 1.

id: typescript
aliases: ["node", "javascript", "ts", "js"]
display_name: "TypeScript"
strictness: legacy_compatible
file_extensions: [".ts", ".tsx", ".js", ".jsx"]

layout:
  repo_root: "."
  module_root: "."
  manifest_root: "."
  default_command_cwd: "{module_root}"

  package_root:
    kind: path_root
    path: "src"

  source_sets:
    - id: src
      role: first_party
      root: "src"
      file_globs:
        - "src/**/*.ts"

  test_sets:
    - id: tests
      role: unit
      root: "tests"
      file_globs:
        - "tests/**/*.test.ts"
        - "tests/**/*.spec.ts"

toolchain:
  manifest:
    path: "package.json"
    format: package.json
    required: true

  module_identity:
    source: manifest
    path: "package.json"
    field: "name"

  dependency_integrity_files:
    - path: "package-lock.json"
      kind: lock
      required: false

  package_manager:
    id: npm
    materialize_command:
      argv: ["npm", "ci"]
      cwd: "{module_root}"
    frozen_mode: {}

imports:
  resolver_adapter: typescript-tsconfig

  first_party:
    rule: path_alias
    base: "src"

  # First-party MODULE-SPECIFIER-coherence contract, projected onto the
  # generation/implement prompts via resolve_module_specifier_guidance. The
  # enforcing gate is the native oracle (the TS compiler): under NodeNext/Node16
  # module resolution a relative import that omits its explicit emitted-file
  # extension fails typecheck with TS2835 (S3 StockRoom-mini TS greenfield
  # dogfood, 2026-07-12 — independently-generated files split on the convention:
  # some emitted `./x.js`, some `./x` → TS2835 ×30). Because each file only
  # compiles if it AGREES with the convention its importers use, the convention
  # must be pinned at GENERATE, exactly like the C# namespace-coherence contract.
  module_specifier_guidance: |
    MODULE-SPECIFIER COHERENCE (release-blocking — the native typecheck enforces this):
    this project uses NodeNext/Node16 module resolution, under which EVERY
    relative import specifier MUST carry an explicit file extension naming the
    EMITTED file — write `import { x } from "./x.js"`, never `"./x"` (and never
    the source `"./x.ts"` extension). This applies identically to re-exports
    (`export { x } from "./x.js"`), to default and namespace imports, and to
    TYPE-ONLY imports (`import type { T } from "./x.js"`) — a type-only import
    is erased at emit but its specifier is still checked. A relative import that
    omits the `.js` extension fails to compile (TS2835), so independently-
    generated files that disagree on the convention cannot reference each other.

  stdlib:
    classifier: adapter

commands:
  typecheck:
    argv: ["npx", "--no-install", "tsc", "--noEmit"]
    cwd: "{module_root}"
    # tsc needs node_modules (it resolves real imports). The contract oracle's
    # install preflight runs ``toolchain.package_manager.materialize_command``
    # (``npm ci``) BLOCKING before tsc when this flag is true — the language-free
    # generalization of the legacy node-install preflight. ``--no-install`` keeps tsc
    # itself offline-honest: a missing install surfaces as an environment error, never
    # an implicit network fetch.
    requires_materialized_deps: true

  verify:
    argv:
      - "npx"
      - "--no-install"
      - "vitest"
      - "run"
      - "{test_root}"
      - "--reporter=json"
      - "--outputFile={report}"
    cwd: "{module_root}"
    report:
      path: ".codd/verify/vitest.json"
      format: vitest-json
      adapter: vitest-json

# Implement-time oracle (Contract Kernel §1): tsc --noEmit is a sufficient static
# checker, so kind=command (the typecheck command id), resolved by typescript-tsc.
implement_oracle:
  kind: command
  adapter: typescript-tsc
  command: typecheck

tests:
  semantics_adapter: typescript-test-semantics
  runner_report_adapter: vitest-json

  test_file_globs:
    - "tests/**/*.test.ts"
    - "tests/**/*.spec.ts"

  # Generation/implement ground truth (2026-07-03 — TS ExprCalc greenfield
  # dogfood): ``commands.verify`` above always runs Vitest directly, but
  # nothing told generation prompts that fact, so a project-level "no
  # third-party dependencies" convention led the AI to write tests against
  # Node's built-in ``node:test`` module instead — a file Vitest cannot
  # collect ("No test suite found in file ..."). This block is read by
  # generator._build_generation_prompt and implementer._build_implementation_prompt
  # (via codd.languages.resolve_test_framework_guidance) so the actual,
  # executed test framework is stated explicitly rather than left for the AI
  # to infer.
  framework:
    name: Vitest
    example: |
      import { describe, it, expect } from "vitest";

      describe("tokenizer", () => {
        it("rejects an unrecognized character", () => {
          expect(() => tokenize("$")).toThrow();
        });
      });

  authenticity_policy:
    marker_must_be_inside_executable_test_block: true
    skipped_is_not_authentic: true
    focused_only_is_not_authentic: true
    assertion_required: true

  assertion_hints:
    libraries:
      - import_path: "vitest"
        functions:
          - expect
      - import_path: "chai"
        functions:
          - expect
          - assert

verify:
  command: verify
  report:
    path: ".codd/verify/vitest.json"
    format: vitest-json
    adapter: vitest-json

  execution_policy:
    every_vb_test_block_must_execute: true
    every_vb_test_block_must_pass: true
    skipped_is_not_green: true
    missing_from_report_is_not_green: true

scaffold:
  adapter: generic-template
  owned_files:
    - "package.json"
    - "tsconfig.json"
    - "vitest.config.ts"

# Legacy project-types bridge (Contract Kernel v2.71) — see python.yaml for the
# rationale. TypeScript accepts EXACTLY ``typescript`` + ``node`` (the historical
# legacy-dict keys), NOT the wider registry aliases ``ts``/``js``/``javascript`` —
# preserving byte-identical support. The realizer ids are harness-policy capability
# names (npm/vitest/tsc), not language names.
legacy_project_types:
  accepted_names: ["typescript", "node"]
  layout_builder: "npm-vitest-tsc-layout-v1"
  scaffolder: "npm-tsconfig-vitest-scaffold-v1"
  test_runner_ensurer: "npm-vitest-runner-v1"

artifacts:
  harness_root: ".codd"

  harness_owned:
    - ".codd/**"
    - "package.json"
    - "tsconfig.json"

  ignored:
    - "node_modules/**"
    - "dist/**"

# CI scaffold (design §v2.70): toolchain bootstrap for a generated CI workflow.
ci:
  setup_steps:
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - run: npm ci
