project_type: cli
# Capability vocabulary documented in generic.yaml.
capabilities:
  user_interface: false
  network_surface: "none"
  e2e_modality: "cli"
  long_running_service: false
default_artifacts:
  - id: "design:requirements"
    title: "Requirements Definition"
    depends_on: []
    scope: "Command goals, operator workflows, runtime constraints, error expectations, and acceptance criteria"
    always_required: true
  - id: "design:system_design"
    title: "System Design"
    depends_on: ["design:requirements"]
    scope: "Package structure, command dispatch, service boundaries, dependency strategy, and runtime lifecycle"
    always_required: true
  - id: "design:command_interface_design"
    title: "Command Interface Design"
    depends_on: ["design:requirements"]
    scope: "Commands, subcommands, flags, arguments, exit codes, help text, and compatibility rules"
    condition: "requirements mention commands, flags, operators, shell usage, or automation"
  - id: "design:configuration_design"
    title: "Configuration Design"
    depends_on: ["design:system_design"]
    scope: "Config file schema, environment variables, precedence, defaults, and validation"
    condition: "requirements mention configuration, environment variables, profiles, or runtime options"
  - id: "design:io_contract_design"
    title: "Input/Output Contract Design"
    depends_on: ["design:command_interface_design"]
    scope: "Input files/streams, output formats, structured JSON/YAML, diagnostics, and stable machine-readable contracts"
    condition: "requirements mention JSON, YAML, stdin/stdout, files, reports, or CI consumption"
  - id: "design:error_handling_design"
    title: "Error Handling Design"
    depends_on: ["design:command_interface_design"]
    scope: "Failure classes, retryability, exit-code mapping, human messages, and machine diagnostics"
    condition: "requirements mention failures, validation, retries, partial success, or non-interactive operation"
  - id: "design:distribution_design"
    title: "Distribution Design"
    depends_on: ["design:system_design"]
    scope: "Packaging, installation, upgrades, platform support, and release channels"
    condition: "requirements mention installation, package managers, binaries, containers, or distribution"
  - id: "design:auth_integration_design"
    title: "Authentication & Integration Design"
    depends_on: ["design:system_design"]
    scope: "API credentials, token storage, device flow, service endpoints, and secret handling"
    condition: "requirements mention API access, authentication, tokens, OAuth, secrets, or remote services"
  - id: "design:non_functional_requirements"
    title: "Non-Functional Requirements"
    depends_on: ["design:requirements"]
    scope: "Performance/capacity, reliability, security, durability, and observability targets, with acceptance thresholds. Reconcile with NFRs recovered from any Infrastructure-as-Code. Omit for a pure CLI/library with no runtime service or operational concerns."
    condition: "requirements or IaC mention performance, capacity, reliability, security, durability, backups, monitoring, SLOs, deployment, infrastructure, servers, containers, or operations"
  - id: "design:infrastructure_design"
    title: "Infrastructure Design"
    depends_on: ["design:system_design"]
    scope: "Provisioned resources, networking, isolation boundaries, and the Infrastructure-as-Code (Terraform/Kubernetes/containers) that realizes them"
    condition: "requirements or IaC describe deployment, infrastructure, servers, containers, or operations"
  - id: "design:deployment_design"
    title: "Deployment Design"
    depends_on: ["design:system_design"]
    scope: "Runtime topology, environment matrix, release/rollout strategy, and CI/CD delivery pipeline"
    condition: "requirements or IaC describe deployment, infrastructure, servers, containers, or operations"
  - id: "design:operations_runbook"
    title: "Operations Runbook"
    depends_on: ["design:system_design"]
    scope: "Scaling, health/monitoring, backup/restore, incident response, and routine operational procedures"
    condition: "requirements or IaC describe deployment, infrastructure, servers, containers, or operations"
