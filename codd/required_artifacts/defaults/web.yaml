project_type: web
# Capability vocabulary documented in generic.yaml.
capabilities:
  user_interface: true
  network_surface: "http"
  e2e_modality: "browser"
  long_running_service: true
default_artifacts:
  - id: "design:requirements"
    title: "Requirements Definition"
    depends_on: []
    scope: "Functional and non-functional requirements, assumptions, constraints, and acceptance boundaries"
    always_required: true
  - id: "design:system_design"
    title: "System Design"
    depends_on: ["design:requirements"]
    scope: "Overall architecture, component boundaries, runtime topology, and integration points"
    always_required: true
  - id: "design:api_design"
    title: "API Design"
    depends_on: ["design:system_design"]
    scope: "REST/GraphQL/RPC endpoints, payload contracts, errors, and versioning"
    condition: "requirements mention API, backend, integration, webhook, or external clients"
  - id: "design:database_design"
    title: "Database Design"
    depends_on: ["design:system_design"]
    scope: "Entities, tables/collections, indexes, migrations, retention, and consistency rules"
    condition: "requirements mention data persistence, records, accounts, reports, or history"
  - id: "design:ux_design"
    title: "UX Design"
    depends_on: ["design:requirements"]
    scope: "Information architecture, screens, interactions, accessibility, and user-facing states"
    condition: "requirements mention UI, users, browser flows, dashboards, forms, or interaction"
  - id: "design:screen_flow_design"
    title: "Screen Flow Design"
    depends_on: ["design:ux_design"]
    scope: "Screens, navigation graph, transition conditions, entry points, and terminal states"
    condition: "requirements mention multiple screens, navigation, redirects, flows, or page transitions"
  - id: "design:auth_authorization_design"
    title: "Authentication & Authorization Design"
    depends_on: ["design:system_design"]
    scope: "Identity, sessions/tokens, role policy, tenant boundaries, and access-control checks"
    condition: "requirements mention login, auth, accounts, permissions, tenant isolation, or roles"
  - id: "design:screen_transitions"
    title: "Screen Transitions (Edge Data)"
    depends_on: ["design:screen_flow_design"]
    scope: "Concrete transition edges with from/to/trigger/guard metadata for validation and E2E generation"
    condition: "requirements mention navigation transitions, redirects, or multi-step user flows"
  - id: "design:non_functional_requirements"
    title: "Non-Functional Requirements"
    depends_on: ["design:requirements"]
    scope: "Availability, scalability, performance/capacity, reliability, security/isolation, durability/DR, and observability/SLO targets, with acceptance thresholds. Reconcile with NFRs recovered from Infrastructure-as-Code (replica counts, autoscaling, resource limits, health probes, backups, network policies)."
    always_required: true
  - id: "design:infrastructure_design"
    title: "Infrastructure Design"
    depends_on: ["design:system_design"]
    scope: "Provisioned resources, networking, isolation boundaries, and the Infrastructure-as-Code (Terraform/Kubernetes/containers) that realizes them"
    condition: "requirements or IaC describe deployment, infrastructure, servers, containers, or operations"
  - id: "design:deployment_design"
    title: "Deployment Design"
    depends_on: ["design:system_design"]
    scope: "Runtime topology, environment matrix, release/rollout strategy, and CI/CD delivery pipeline"
    condition: "requirements or IaC describe deployment, infrastructure, servers, containers, or operations"
  - id: "design:operations_runbook"
    title: "Operations Runbook"
    depends_on: ["design:system_design"]
    scope: "Scaling, health/monitoring, backup/restore, incident response, and routine operational procedures"
    condition: "requirements or IaC describe deployment, infrastructure, servers, containers, or operations"
