# project_lexicon.yaml schema definition and validation spec
version: "1.0"
required_sections:
  - node_vocabulary
  - naming_conventions
  - design_principles

optional_sections:
  - failure_modes
  - extractor_registry

provenance_values:
  - web_search
  - official_doc
  - human
  - inferred

node_vocabulary:
  design_token:
    description: "UI design tokens from DESIGN.md (W3C Design Tokens spec)"
    examples:
      - "colors.Primary"
      - "typography.body"
      - "spacing.sm"
      - "components.Button.primary"
    categories:
      - color
      - typography
      - spacing
      - component

node_vocabulary_item:
  required_fields: [id, description]
  optional_fields:
    - extractor
    - naming_convention
    - drift_detector
    - prefix_rules
    - plurality
    - provenance
    - confidence
    - fetched_at
    - examples
    - categories

naming_convention_item:
  required_fields: [id, regex]

extractor_registry_item:
  required_fields: [type]
  optional_fields: [config_schema, description]
