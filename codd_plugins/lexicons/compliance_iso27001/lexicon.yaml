coverage_axes:
  - axis_type: "context_organization"
    rationale: "ISO/IEC 27001 clause 4 establishes organizational context, interested parties, ISMS scope, and the management system."
    criticality_default: high
    variants:
      - id: "Context of the organization"
        label: "Context of the organization"
        attributes: {source: "ISO/IEC 27001:2022 clause 4", source_literal: "Context of the organization"}
        criticality: high
      - id: "interested parties"
        label: "Interested parties"
        attributes: {source: "ISO/IEC 27001:2022 clause 4", coverage_target: "needs and expectations"}
        criticality: medium
      - id: "ISMS scope"
        label: "ISMS scope"
        attributes: {source: "ISO/IEC 27001:2022 clause 4", coverage_target: "management-system boundary"}
        criticality: high
  - axis_type: "leadership"
    rationale: "ISO/IEC 27001 clause 5 requires leadership, policy, organizational roles, responsibilities, and authorities."
