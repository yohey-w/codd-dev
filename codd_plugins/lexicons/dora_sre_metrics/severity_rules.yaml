defaults:
  coverage_gap: high
  implicit: medium
  covered: info
rules:
  - when: "axis=deployment_frequency AND coverage=gap"
    severity: medium
    rationale: "Missing deployment frequency coverage leaves release cadence and delivery throughput unmeasured."
  - when: "axis=lead_time_for_changes AND coverage=gap"
    severity: medium
    rationale: "Missing lead-time coverage hides delays between code change and production availability."
  - when: "axis=change_failure_rate AND coverage=gap"
    severity: high
    rationale: "Missing change failure coverage obscures whether deployments cause incidents, rollback, or hotfixes."
  - when: "axis=mean_time_to_restore AND coverage=gap"
    severity: high
    rationale: "Missing restore-time coverage leaves incident recovery speed ungoverned."
  - when: "axis=slo_sli_definition AND coverage=gap"
    severity: high
    rationale: "Without SLIs and SLOs, reviewers cannot tell what reliability target is promised or how it is measured."
  - when: "axis=error_budget_policy AND coverage=gap"
    severity: high
    rationale: "Without an error budget policy, reliability risk cannot drive release, alerting, or escalation decisions."
  - when: "axis=toil_reduction AND coverage=gap"
    severity: medium
    rationale: "Toil gaps leave repetitive manual operations without an automation or reduction path."
  - when: "axis=incident_management AND coverage=gap"
    severity: high
    rationale: "Missing incident management coverage leaves failures without declared response, escalation, recovery, or learning steps."
  - when: "coverage=implicit AND evidence=weak"
    severity: medium
    rationale: "Weak implicit operations coverage needs reviewer confirmation before it can satisfy a DORA or SRE axis."
  - when: "coverage=covered AND finding=residual_observation"
    severity: info
    rationale: "Covered axes can still produce informational notes outside release-blocking operational gaps."
