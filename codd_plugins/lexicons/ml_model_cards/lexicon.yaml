      - id: "recommendations"
        label: "Recommendations"
        attributes: {source: "Model Cards", coverage_target: "deployment guidance"}
        criticality: medium
  - axis_type: "model_versioning"
    rationale: "Model cards for deployed systems should identify registry, version history, rollback, and update ownership for model lifecycle governance."
    criticality_default: medium
    variants:
      - id: "model registry"
        label: "Model registry"
        attributes: {source: "ML lifecycle practice", coverage_target: "registered model lineage"}
        criticality: medium
      - id: "rollback strategy"
        label: "Rollback strategy"
        attributes: {source: "ML lifecycle practice", coverage_target: "safe model reversion"}
        criticality: medium
      - id: "version history"
        label: "Version history"
        attributes: {source: "ML lifecycle practice", coverage_target: "model change traceability"}
        criticality: medium
