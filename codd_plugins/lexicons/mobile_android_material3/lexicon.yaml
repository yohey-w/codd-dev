      - id: "Applying icons"
        label: "Icon application guidance"
        attributes: {source_literal: "Applying icons", source_url: "https://m3.material.io/styles/icons"}
        criticality: medium
  - axis_type: "Accessibility"
    rationale: "Material guidance includes accessibility guidelines for helping people of diverse abilities use UI."
    criticality_default: critical
    variants:
      - id: "Accessibility guidelines"
        label: "Accessibility guideline coverage"
        attributes: {source_literal: "Accessibility guidelines", source_url: "https://material.io/design/usability/accessibility.html"}
