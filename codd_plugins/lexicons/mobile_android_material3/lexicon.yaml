coverage_axes:
  - axis_type: "Color"
    rationale: "Material Design 3 publishes Color guidance for schemes, hierarchy, state, and brand communication."
    criticality_default: high
    variants:
      - id: "Color"
        label: "Color system coverage"
        attributes: {source_literal: "Color", source_url: "https://m3.material.io/styles/color/system"}
        criticality: high
      - id: "Color roles"
        label: "Color role mapping"
        attributes: {source_literal: "Color roles", source_url: "https://m3.material.io/styles/color/roles"}
        criticality: high
  - axis_type: "Typography"
    rationale: "Material Design 3 publishes Typography guidance with fonts, type scale, tokens, and applying type."
    criticality_default: high
    variants:
      - id: "Typography"
        label: "Type hierarchy and scale"
        attributes: {source_literal: "Typography", source_url: "https://m3.material.io/styles/typography"}
        criticality: high
      - id: "Type scale & tokens"
        label: "Type scale and token coverage"
        attributes: {source_literal: "Type scale & tokens", source_url: "https://m3.material.io/styles/typography"}
        criticality: medium
  - axis_type: "Shape"
    rationale: "Material Design 3 publishes Shape guidance for principles, corner radius scale, and shape morph."
    criticality_default: medium
    variants:
      - id: "Shape"
        label: "Shape system coverage"
        attributes: {source_literal: "Shape", source_url: "https://m3.material.io/styles/shape"}
        criticality: medium
      - id: "Corner radius scale"
        label: "Corner radius scale"
        attributes: {source_literal: "Corner radius scale", source_url: "https://m3.material.io/styles/shape"}
        criticality: medium
  - axis_type: "Elevation"
    rationale: "Material Design 3 publishes Elevation guidance for hierarchy and tokens."
    criticality_default: medium
    variants:
      - id: "Elevation"
        label: "Elevation hierarchy"
        attributes: {source_literal: "Elevation", source_url: "https://m3.material.io/styles/elevation"}
        criticality: medium
      - id: "Tokens"
        label: "Elevation token coverage"
        attributes: {source_literal: "Tokens", source_url: "https://m3.material.io/styles/elevation"}
        criticality: info
  - axis_type: "Motion"
    rationale: "Material Design 3 publishes Motion guidance with overview, easing, duration, and transitions."
    criticality_default: high
    variants:
      - id: "Motion"
        label: "Motion behavior"
        attributes: {source_literal: "Motion", source_url: "https://m3.material.io/styles/motion/overview"}
        criticality: high
      - id: "Easing and duration"
        label: "Easing and duration"
        attributes: {source_literal: "Easing and duration", source_url: "https://m3.material.io/styles/motion/easing-and-duration"}
        criticality: medium
      - id: "Transitions"
        label: "Transition patterns"
        attributes: {source_literal: "Transitions", source_url: "https://m3.material.io/styles/motion/transitions"}
        criticality: high
  - axis_type: "Components"
    rationale: "Material Design 3 publishes Components guidance for reusable interactive UI building blocks."
    criticality_default: high
    variants:
      - id: "Components"
        label: "Component selection and usage"
        attributes: {source_literal: "Components", source_url: "https://m3.material.io/components"}
        criticality: high
      - id: "Accessibility"
        label: "Component accessibility tab coverage"
        attributes: {source_literal: "Accessibility", source_url: "https://m3.material.io/components/buttons"}
        criticality: high
  - axis_type: "Icons"
    rationale: "Material Design 3 publishes Icons guidance for designing and applying icons."
    criticality_default: medium
    variants:
      - id: "Icons"
        label: "Icon design and application"
        attributes: {source_literal: "Icons", source_url: "https://m3.material.io/styles/icons"}
