      - id: "Touch target"
        label: "Touch target coverage"
        attributes: {source_literal: "Touch target", source_url: "https://m3.material.io/develop/web/supporting/touch-target"}
        criticality: high
  - axis_type: "Adaptive design"
    rationale: "Material Design 3 publishes Adaptive design guidance for screen sizes, panes, and responsive behavior."
    criticality_default: high
    variants:
      - id: "Adaptive design"
        label: "Adaptive design behavior"
        attributes: {source_literal: "Adaptive design", source_url: "https://m3.material.io/foundations/adaptive-design"}
        criticality: high
      - id: "Layout"
        label: "Layout behavior"
        attributes: {source_literal: "Layout", source_url: "https://m3.material.io/foundations/layout"}
        criticality: high
  - axis_type: "Interaction"
    rationale: "Material Design 3 publishes Interaction foundations including gestures, selection, and states."
    criticality_default: high
    variants:
      - id: "Interaction"
        label: "Interaction behavior"
        attributes: {source_literal: "Interaction", source_url: "https://m3.material.io/foundations/interaction"}
        criticality: high
      - id: "Interaction states"
        label: "State layer and interaction state coverage"
        attributes: {source_literal: "Interaction states", source_url: "https://m3.material.io/foundations/interaction/states"}
        criticality: high
  - axis_type: "Content design"
    rationale: "Material Design 3 publishes Content design guidance for UX writing and user-facing language."
    criticality_default: medium
    variants:
      - id: "Content design"
        label: "Content design coverage"
        attributes: {source_literal: "Content design", source_url: "https://m3.material.io/foundations/content-design"}
        criticality: medium
  - axis_type: "Dynamic color"
    rationale: "Material Design 3 publishes Dynamic color guidance under the color system."
    criticality_default: medium
    variants:
      - id: "Dynamic color"
        label: "Dynamic color source and application"
        attributes: {source_literal: "Dynamic color", source_url: "https://m3.material.io/styles/color/dynamic"}
        criticality: medium
      - id: "Choosing a scheme"
        label: "Color scheme choice"
        attributes: {source_literal: "Choosing a scheme", source_url: "https://m3.material.io/styles/color/choosing-a-scheme"}
        criticality: medium
