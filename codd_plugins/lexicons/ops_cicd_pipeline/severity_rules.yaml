defaults:
  coverage_gap: high
  implicit: medium
  covered: info
rules:
  - when: "axis=declarative_config AND coverage=gap"
    severity: critical
    rationale: "Without declared desired state, reviewers cannot determine what the pipeline is meant to converge toward."
  - when: "axis=version_control AND coverage=gap"
    severity: critical
    rationale: "Unversioned desired state removes review history, immutability, and auditability from deployment changes."
  - when: "axis=automated_apply AND coverage=gap"
    severity: high
    rationale: "Manual application leaves deployment behavior outside the pipeline contract."
  - when: "axis=continuous_reconciliation AND coverage=gap"
    severity: high
    rationale: "A pipeline that does not reconcile actual state against desired state can silently diverge after release."
  - when: "axis=drift_detection AND coverage=gap"
    severity: high
    rationale: "Drift gaps prevent reviewers from seeing whether actual state differs from declared state."
  - when: "axis=rollback AND coverage=gap"
    severity: high
    rationale: "Rollback gaps leave failed deployments without a declared recovery path."
  - when: "axis=observability AND coverage=gap"
    severity: medium
    rationale: "Pipeline observability gaps make reconciliation, synchronization, and failure states hard to diagnose."
  - when: "coverage=implicit AND evidence=weak"
    severity: medium
    rationale: "Weak implicit pipeline coverage needs reviewer confirmation before it can satisfy a GitOps axis."
  - when: "coverage=covered AND finding=residual_observation"
    severity: info
    rationale: "Covered axes can still produce informational notes outside release-blocking pipeline gaps."

