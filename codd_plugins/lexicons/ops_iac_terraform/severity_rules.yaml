defaults:
  coverage_gap: high
  implicit: medium
  covered: info
rules:
  - when: "axis=terraform AND coverage=gap"
    severity: high
    rationale: "Terraform settings gaps can leave version, provider, or backend compatibility undefined."
  - when: "axis=provider AND coverage=gap"
    severity: high
    rationale: "Provider gaps can leave plugin source, version, or alias behavior unclear."
  - when: "axis=resource AND coverage=gap"
    severity: critical
    rationale: "Resource gaps can leave managed infrastructure objects and lifecycle behavior undefined."
  - when: "axis=data AND coverage=gap"
    severity: medium
    rationale: "Data source gaps can leave external information queries and dependency timing unclear."
  - when: "axis=variable AND coverage=gap"
    severity: high
    rationale: "Variable and output gaps can leave module inputs, outputs, types, and sensitive values ungoverned."
  - when: "axis=state AND coverage=gap"
    severity: high
    rationale: "State gaps can break resource mapping, import, or refactor traceability."
  - when: "axis=module AND coverage=gap"
    severity: high
    rationale: "Module gaps can leave reuse, source, version, provider passing, or output contracts undefined."
  - when: "axis=workspace AND coverage=gap"
    severity: medium
    rationale: "Workspace gaps can leave state partitioning and environment selection ambiguous."
  - when: "axis=backend AND coverage=gap"
    severity: high
    rationale: "Backend gaps can leave persistent state storage and initialization behavior unsafe."
  - when: "axis=Sentinel AND coverage=gap"
    severity: medium
    rationale: "Sentinel policy gaps can leave policy-as-code, policy sets, and enforcement behavior undefined."
  - when: "coverage=implicit AND evidence=weak"
    severity: medium
    rationale: "Weak implicit Terraform coverage needs reviewer confirmation before it can satisfy an axis."
  - when: "coverage=covered AND finding=residual_observation"
    severity: info
    rationale: "Covered axes can still produce informational notes outside release-blocking Terraform gaps."
