coverage_axes:
  - axis_type: "Workloads"
    rationale: "Kubernetes API Reference v1.30 defines Workloads resources as the objects used to manage and run containers on the cluster."
    criticality_default: high
    variants:
      - id: "Pod"
        label: "Pod"
        attributes: {source: "Kubernetes API Reference v1.30", coverage_target: "container execution unit"}
        criticality: critical
      - id: "Deployment"
        label: "Deployment"
        attributes: {source: "Kubernetes API Reference v1.30", coverage_target: "stateless controller"}
