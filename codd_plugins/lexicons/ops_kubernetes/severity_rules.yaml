defaults:
  coverage_gap: high
  implicit: medium
  covered: info
rules:
  - when: "axis=Workloads AND coverage=gap"
    severity: high
    rationale: "Workload gaps leave container execution, controller ownership, or rollout behavior undefined."
  - when: "axis=Service AND coverage=gap"
    severity: high
    rationale: "Service and networking gaps can make workload reachability, routing, or network isolation unverifiable."
  - when: "axis=ConfigMap AND coverage=gap"
    severity: high
    rationale: "Configuration and Secret gaps can hide application initialization data or sensitive data handling requirements."
  - when: "axis=PersistentVolume AND coverage=gap"
    severity: high
    rationale: "Storage gaps can leave persistence, claim binding, or pod volume attachment undefined."
  - when: "axis=RBAC AND coverage=gap"
    severity: critical
    rationale: "RBAC gaps can grant unclear or excessive Kubernetes API permissions."
  - when: "axis=Scheduling AND coverage=gap"
    severity: medium
    rationale: "Scheduling gaps can leave node placement, spread, or taint tolerance behavior implicit."
  - when: "axis=ResourceQuota AND coverage=gap"
    severity: high
    rationale: "Resource governance gaps can cause workload starvation or tenant-level capacity contention."
  - when: "axis=Probe AND coverage=gap"
    severity: high
    rationale: "Probe gaps can make restart, readiness, and slow-start behavior unsafe or untestable."
  - when: "axis=HorizontalPodAutoscaler AND coverage=gap"
    severity: high
    rationale: "Autoscaling gaps can leave target metrics and replica bounds undefined."
  - when: "axis=Events AND coverage=gap"
    severity: medium
    rationale: "Observability gaps can leave events, metrics, traces, logs, or audit trails unavailable for operations."
  - when: "axis=Upgrade A Cluster AND coverage=gap"
    severity: medium
    rationale: "Upgrade gaps can leave disruption, drain, or API compatibility behavior undefined."
  - when: "axis=Namespace AND coverage=gap"
    severity: high
    rationale: "Namespace gaps can weaken multi-tenant scoping, quotas, access, and network isolation."
  - when: "coverage=implicit AND evidence=weak"
    severity: medium
    rationale: "Weak implicit Kubernetes coverage needs reviewer confirmation before it can satisfy an axis."
  - when: "coverage=covered AND finding=residual_observation"
    severity: info
    rationale: "Covered axes can still produce informational notes outside release-blocking Kubernetes gaps."
