coverage_axes:
  - axis_type: "functional_suitability"
    rationale: "ISO/IEC 25010 functional suitability covers whether functions meet stated and implied needs under specified conditions."
    criticality_default: critical
    variants:
      - id: "Functional Suitability"
        label: "Functional suitability"
        attributes: {source: "ISO/IEC 25010", source_literal: "Functional Suitability"}
        criticality: critical
      - id: "Functional completeness"
        label: "Functional completeness"
        attributes: {source: "ISO/IEC 25010", coverage_target: "task and user objective coverage"}
        criticality: critical
      - id: "Functional correctness"
        label: "Functional correctness"
        attributes: {source: "ISO/IEC 25010", coverage_target: "accurate results"}
