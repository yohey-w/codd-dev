coverage_axes:
  - axis_type: "test_concepts_definitions"
    rationale: "ISO/IEC/IEEE 29119-1 specifies general concepts and key concepts for the software testing series."
    criticality_default: high
    variants:
      - id: "general concepts"
        label: "General concepts"
        attributes: {source: "ISO/IEC/IEEE 29119-1:2022", source_literal: "General concepts"}
        criticality: high
      - id: "key concepts"
        label: "Key concepts"
        attributes: {source: "ISO/IEC/IEEE 29119-1:2022", coverage_target: "series concepts"}
        criticality: high
