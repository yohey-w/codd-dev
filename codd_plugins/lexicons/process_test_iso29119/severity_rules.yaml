defaults:
  coverage_gap: high
  implicit: medium
  covered: info
rules:
  - when: "axis=test_concepts_definitions AND coverage=gap"
    severity: high
    rationale: "Concept and terminology gaps make test scope, levels, and evidence ambiguous."
  - when: "axis=test_processes AND coverage=gap"
    severity: critical
    rationale: "Test-process gaps leave organizational, management, and dynamic testing work without a controlled process."
  - when: "axis=test_documentation AND coverage=gap"
    severity: high
    rationale: "Test-documentation gaps leave test plans, cases, procedures, results, or reports unauditable."
  - when: "axis=test_techniques AND coverage=gap"
    severity: high
    rationale: "Test-technique gaps leave test design without explicit derivation methods."
  - when: "axis=keyword_driven_testing AND coverage=gap"
    severity: medium
    rationale: "Keyword-driven testing gaps leave reusable automated test specifications and keyword hierarchies undefined."
  - when: "axis=work_aided_software_testing AND coverage=gap"
    severity: medium
    rationale: "Work-aided testing gaps leave tool, review, automation, or assisted-test work products unsupported."
  - when: "coverage=implicit AND evidence=weak"
    severity: medium
    rationale: "Weak implicit ISO/IEC/IEEE 29119 coverage needs reviewer confirmation before it can satisfy a testing axis."
  - when: "coverage=covered AND finding=residual_observation"
    severity: info
    rationale: "Covered axes may still produce informational notes outside release-blocking testing-process gaps."

