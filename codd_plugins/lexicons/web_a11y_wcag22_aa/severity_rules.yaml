rules:
  - when: "axis=1.1 Text Alternatives AND coverage=gap"
    severity: high
    rationale: "Non-text content without text alternatives can block perceivability."
  - when: "axis=1.2 Time-based Media AND coverage=gap"
    severity: high
    rationale: "Time-based media without alternatives can block audio or video access."
  - when: "axis=1.3 Adaptable AND coverage=gap"
    severity: high
    rationale: "Missing adaptable structure can prevent programmatic determination."
  - when: "axis=1.4 Distinguishable AND coverage=gap"
    severity: high
    rationale: "Missing distinguishability coverage can hide contrast, reflow, and visual presentation failures."
  - when: "axis=2.1 Keyboard Accessible AND coverage=gap"
    severity: critical
    rationale: "Keyboard gaps can block operation for keyboard and assistive technology users."
  - when: "axis=2.2 Enough Time AND coverage=gap"
    severity: medium
    rationale: "Timing gaps can block users who need more time or control over moving content."
  - when: "axis=2.3 Seizures and Physical Reactions AND coverage=gap"
    severity: critical
    rationale: "Flash or motion gaps can create physical safety risk."
  - when: "axis=2.4 Navigable AND coverage=gap"
    severity: high
    rationale: "Navigation gaps can prevent locating content and maintaining focus context."
  - when: "axis=2.5 Input Modalities AND coverage=gap"
    severity: high
    rationale: "Input modality gaps can block pointer, touch, motion, or target-size access."
  - when: "axis=3.1 Readable AND coverage=gap"
    severity: medium
    rationale: "Readable gaps can make language and pronunciation unclear."
  - when: "axis=3.2 Predictable AND coverage=gap"
    severity: medium
    rationale: "Predictability gaps can make navigation or input behavior surprising."
  - when: "axis=3.3 Input Assistance AND coverage=gap"
    severity: high
    rationale: "Input assistance gaps can prevent error recovery and authentication access."
  - when: "axis=4.1 Compatible AND coverage=gap"
    severity: high
    rationale: "Compatibility gaps can prevent assistive technologies from reading state and semantics."
  - when: "coverage=implicit"
    severity: info
    rationale: "Implicit coverage should be documented but is not a blocking accessibility gap."
