      - id: "isUserVerifyingPlatformAuthenticatorAvailable()"
        label: "User-verifying platform authenticator availability"
        attributes: {source_literal: "isUserVerifyingPlatformAuthenticatorAvailable()", coverage_target: "platform verification capability"}
