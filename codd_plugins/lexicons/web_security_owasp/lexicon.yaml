coverage_axes:
  - axis_type: broken_access_control
    rationale: "OWASP Top 10:2021 A01 Broken Access Control covers authorization bypass, direct object access, least privilege, and secure failure of access controls."
    criticality_default: critical
    variants:
      - id: a01_2021_broken_access_control
        label: "A01:2021 Broken Access Control"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "authorization boundary"
        criticality: critical
  - axis_type: cryptographic_failures
    rationale: "OWASP Top 10:2021 A02 Cryptographic Failures covers exposure of sensitive data through missing, weak, or incorrectly applied cryptographic protection."
    criticality_default: critical
    variants:
      - id: a02_2021_cryptographic_failures
        label: "A02:2021 Cryptographic Failures"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "data protection"
        criticality: critical
  - axis_type: injection
    rationale: "OWASP Top 10:2021 A03 Injection covers unsafe interpretation of untrusted input by query, command, expression, or document interpreters."
    criticality_default: critical
    variants:
      - id: a03_2021_injection
        label: "A03:2021 Injection"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "interpreter boundary"
        criticality: critical
  - axis_type: insecure_design
    rationale: "OWASP Top 10:2021 A04 Insecure Design covers missing or ineffective threat-driven design controls before implementation details are considered."
    criticality_default: high
    variants:
      - id: a04_2021_insecure_design
        label: "A04:2021 Insecure Design"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "design control"
        criticality: high
  - axis_type: security_misconfiguration
    rationale: "OWASP Top 10:2021 A05 Security Misconfiguration covers insecure defaults, incomplete hardening, excessive features, and missing security headers or settings."
    criticality_default: high
    variants:
      - id: a05_2021_security_misconfiguration
        label: "A05:2021 Security Misconfiguration"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "configuration baseline"
        criticality: high
  - axis_type: vulnerable_and_outdated_components
    rationale: "OWASP Top 10:2021 A06 Vulnerable and Outdated Components covers dependencies, runtime components, and unsupported versions with known exposure."
    criticality_default: high
    variants:
      - id: a06_2021_vulnerable_and_outdated_components
        label: "A06:2021 Vulnerable and Outdated Components"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "component lifecycle"
        criticality: high
  - axis_type: identification_and_authentication_failures
    rationale: "OWASP Top 10:2021 A07 Identification and Authentication Failures covers identity proofing, credential handling, session identity, and account recovery weaknesses."
    criticality_default: critical
    variants:
      - id: a07_2021_identification_and_authentication_failures
        label: "A07:2021 Identification and Authentication Failures"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "identity boundary"
        criticality: critical
  - axis_type: software_and_data_integrity_failures
    rationale: "OWASP Top 10:2021 A08 Software and Data Integrity Failures covers update, pipeline, plugin, deserialization, and data integrity controls."
    criticality_default: high
    variants:
      - id: a08_2021_software_and_data_integrity_failures
        label: "A08:2021 Software and Data Integrity Failures"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "integrity boundary"
        criticality: high
  - axis_type: security_logging_and_monitoring_failures
    rationale: "OWASP Top 10:2021 A09 Security Logging and Monitoring Failures covers security event visibility, alerting, audit trails, and incident response readiness."
    criticality_default: high
    variants:
      - id: a09_2021_security_logging_and_monitoring_failures
        label: "A09:2021 Security Logging and Monitoring Failures"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "detection and response"
        criticality: high
  - axis_type: server_side_request_forgery_ssrf
    rationale: "OWASP Top 10:2021 A10 Server Side Request Forgery (SSRF) covers untrusted outbound request targets and access to unintended internal resources."
    criticality_default: high
    variants:
      - id: a10_2021_server_side_request_forgery_ssrf
        label: "A10:2021 Server Side Request Forgery (SSRF)"
        attributes:
          source: "OWASP Top 10:2021"
          focus: "outbound request boundary"
        criticality: high
  - axis_type: authentication
    rationale: "OWASP ASVS 4.0.3 V2 Authentication covers authenticators, credential recovery, credential storage, and service authentication controls."
    criticality_default: critical
    variants:
      - id: v2_authentication
        label: "V2 Authentication"
        attributes:
          source: "OWASP ASVS 4.0.3"
          focus: "authentication verification"
        criticality: critical
  - axis_type: session_management
    rationale: "OWASP ASVS 4.0.3 V3 Session Management covers session token creation, binding, termination, cookie use, and re-authentication."
    criticality_default: critical
    variants:
      - id: v3_session_management
        label: "V3 Session Management"
        attributes:
          source: "OWASP ASVS 4.0.3"
          focus: "session verification"
        criticality: critical
  - axis_type: input_validation
    rationale: "OWASP ASVS 4.0.3 V5.1 Input Validation covers positive validation, typing, length, pattern, and unsafe parameter handling."
    criticality_default: high
    variants:
      - id: v5_1_input_validation
        label: "V5.1 Input Validation"
        attributes:
          source: "OWASP ASVS 4.0.3"
          focus: "input trust boundary"
        criticality: high
  - axis_type: output_encoding_and_injection_prevention
    rationale: "OWASP ASVS 4.0.3 V5.3 Output Encoding and Injection Prevention covers context-aware output encoding, escaping, parameterized access, and interpreter-safe handling."
    criticality_default: critical
    variants:
      - id: v5_3_output_encoding_and_injection_prevention
        label: "V5.3 Output Encoding and Injection Prevention"
        attributes:
          source: "OWASP ASVS 4.0.3"
          focus: "output interpreter boundary"
        criticality: critical
