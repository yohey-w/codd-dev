- id: F-confusable-passthrough
  axis: D5
  date: '2026-06-12'
  model_used: current-generation models broadly (owner-reported; reproduced deterministically) — affects
    Sonnet AND Opus, not a single weak model. Leans conceptual (a NEW check layer, not a model-sensitivity
    instrument finding).
  symptom: 'a NEW false-green class the FX1 syntax gate cannot catch. Current-generation models
    intermittently emit non-ASCII LOOKALIKE (homoglyph) characters in generated code — not typographic
    punctuation in a code position (which the syntax gate already catches because it breaks parsing) but
    homoglyphs in SYNTACTICALLY-VALID positions the parser ACCEPTS: a Cyrillic е (U+0435) / а (U+0430) /
    і (U+0456) substituted for an ASCII letter INSIDE an otherwise-ASCII identifier (іd looks like id but
    is a different name; a Cyrillic е inside def makes dеf a mixed-script NAME, not the keyword). The file
    PARSES FINE, so the write-time syntax gate (ast.parse) passes it; it may even pass tests written with
    the same wrong char, but is semantically broken at runtime (NameError / silent dict-key mismatch).
    This is a model-generation-instability robustness gap that passes the parse-only gate.'
  root_cause: 'no confusable-detection layer existed. The syntax gate validates only that a payload PARSES;
    a homoglyph in a valid identifier position parses, so the gate (correctly, by its contract) lets it
    through. Catching it needs a SEPARATE deterministic check that distinguishes code positions from
    string/comment literals (non-ASCII is legitimate in literals — Japanese UI copy — and must NOT be
    flagged) and flags the high-signal homoglyph pattern.'
  fix_commit: 79294fe  # short sha of the fix+tests+ledger commit
  fix_description: 'codd/implementer.py — a new write-time confusable-character check (layer 2), sibling of
    the syntax gate, run at the SAME point in the implementer write path and reusing the SAME machinery:
    atomic validate-all-then-write (nothing on disk until every payload is clean), the bounded retry budget
    (implement.syntax_gate_max_attempts, default 3), and the ImplementSyntaxGateError feedback/retry loop.
    PRECISION is the whole design (false positives are the main risk), so it is deliberately narrow:
    _confusable_findings tokenizes Python with the stdlib `tokenize` module and inspects ONLY code-position
    tokens — NAME/identifier and OP/operator — and skips STRING, COMMENT, and f-string text tokens ENTIRELY,
    so non-ASCII inside string literals and comments is NEVER flagged (the critical false-positive guard).
    In NAME tokens it flags ONLY mixed-script identifiers (_confusable_scripts_in_identifier: an identifier
    mixing ASCII-Latin with Cyrillic/Greek, detected via the first word of unicodedata.name — the
    near-zero-false-positive homoglyph signal); a single-script non-Latin identifier a language genuinely
    allows (pure Greek/CJK) is NOT flagged. In OP tokens it flags any non-ASCII (full-width punctuation;
    most already break parse — cheap backstop). Non-Python files are skipped (_confusable_code_error gates
    on .py suffix / project language; the syntax gate is their backstop) and un-tokenizable input returns
    empty (that is the syntax gate''s job). On detection, ImplementSyntaxGateError carries confusable_failures
    and feedback_message() names the file, line, the confusable char (codepoint + Unicode name + script),
    the identifier, and directs "this identifier mixes scripts (likely a homoglyph); use ASCII Latin letters
    for ALL code identifiers — do NOT change text inside string literals or comments." Opt-out
    implement.confusable_check (default ON, documented in codd/defaults.yaml); independent of the syntax gate
    (each can be toggled separately; either failure drives the bounded retry). CLI/model-agnostic and
    language-aware (Python precise via tokenize; others conservatively skipped). Preserves FX1 syntax gate,
    339a763 feedback, dc90c09 (transient/ceiling), da60634 (timeout), 3ea34b4 (stdout contract). Generality
    gate held: no project names, developer-tool framing, general to any project/model. Full suite green
    (4216 passed, 0 skipped; was 4190 + 26 new tests).'
  regression_test: 'tests/test_confusable_check.py (26 tests) — mixed-script classification
    (test_mixed_script_latin_plus_cyrillic_is_flagged, test_mixed_script_latin_plus_greek_is_flagged,
    test_pure_ascii_identifier_is_not_flagged, test_single_script_non_latin_identifier_is_not_flagged);
    code-vs-literal isolation (test_findings_skip_non_ascii_inside_string_literal,
