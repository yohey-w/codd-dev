    test_japanese_string_and_comment_pass_the_gate — end-to-end false-positive guard, written on FIRST
    attempt); opt-out + independence (test_confusable_check_opt_out_writes_homoglyph_file,
    test_confusable_check_enabled_resolver, test_syntax_gate_off_but_confusable_on_still_catches_homoglyph).'
