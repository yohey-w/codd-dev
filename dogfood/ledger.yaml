- id: PC-d5-nonascii-code-feedback
  axis: D5
  hypothesis: A weak model primed by non-ASCII (e.g. Japanese) requirements/context repeatedly emits
    typographic/full-width punctuation into code positions; the write-time syntax gate correctly rejects
    but the bounded retries exhaust because the feedback is non-actionable. The retry feedback must name
    the offending codepoint(s) + line and direct the model to ASCII for code tokens, with one more bounded
    attempt — so a recoverable slip converges within the budget while a genuinely unfixable file still
    fails honestly. Build + regression-test the actionable feedback and the (configurable) budget.
  origin: derived:F-syntax-gate-nonascii-feedback
  priority: 1
  status: done  # 2026-06-12 — surfaced+fixed F-syntax-gate-nonascii-feedback (codd/implementer.py:
    # codepoint-aware ImplementSyntaxGateError.feedback_message + _describe_nonascii_code_chars; bounded
    # gate budget 2→3 via _syntax_gate_max_attempts / implement.syntax_gate_max_attempts). FX1 atomicity,
    # honest failure, and opt-out preserved; gate not weakened. Regression-tested in
    # tests/test_implement_syntax_gate.py (section 7).
- id: PC-d5-confusable-passthrough
  axis: D5
  hypothesis: Current-generation models (Sonnet AND Opus) intermittently emit non-ASCII LOOKALIKE
    (homoglyph) characters in generated code in SYNTACTICALLY-VALID positions the parser accepts — a
    Cyrillic/Greek letter substituted for an ASCII letter INSIDE an otherwise-ASCII identifier (іd vs id;
    dеf as a mixed-script NAME). The file parses, so the parse-only syntax gate passes it; it may even pass
    tests written with the same wrong char, but is semantically broken (NameError / silent mismatch) — a
    NEW false-green class. A SEPARATE deterministic confusable detector is needed, scoped to code positions
    (tokenize NAME/OP, skip STRING/COMMENT/f-string text) and flagging mixed-script identifiers (near-zero
    false-positive); non-ASCII in legitimate string/comment literals must NOT be flagged. Integrate at the
    write-time gate with the same atomic-write + bounded-retry + actionable feedback; opt-out + language-aware.
  origin: derived:F-confusable-passthrough
  priority: 1
  status: done  # 2026-06-12 — surfaced+fixed F-confusable-passthrough (codd/implementer.py: new
    # confusable_check layer — _confusable_findings via stdlib tokenize inspects only NAME/OP tokens,
    # skips STRING/COMMENT/f-string text; _confusable_scripts_in_identifier flags Latin+Cyrillic/Greek
    # mixed-script identifiers; ImplementSyntaxGateError.confusable_failures drives codepoint+script-aware
    # feedback through the existing bounded retry; opt-out implement.confusable_check, default ON). FX1
    # atomicity, honest failure, and the syntax gate preserved + independent. Critical false-positive guard
    # (non-ASCII in string/comment literals NOT flagged) regression-tested in tests/test_confusable_check.py.
- id: PC-d4-vb-gate-stage-granularity
  axis: D4
  hypothesis: 'A project-wide invariant (the verifiable-behavior coverage gate) enforced PER implement task
    fails any early task that is not the one writing the covering tests — a granularity bug that only appears
    above a task-count threshold (single-task projects never surface it). The gate must NOT be disabled (that
    loses the anti-false-green guarantee); it must move to the right granularity: OFF per greenfield task, run
    ONCE project-wide after all implement tasks complete, still hard-gating by default and honoring the
    greenfield coverage_gate opt-out, with the standalone per-task gate unchanged. Build + regression-test the
    stage-granularity gate.'
  origin: derived:F-vb-gate-per-task-granularity
  priority: 1
  status: done  # 2026-06-13 — surfaced+fixed F-vb-gate-per-task-granularity (codd/greenfield/pipeline.py:
    # per-task gate removed from _default_implement_task_runner; new _enforce_stage_coverage_gate runs the
    # existing project-wide run_implement_coverage_gate ONCE at the end of _stage_implement; honors the
    # greenfield coverage_gate option; standalone codd implement run --task gate unchanged, cli.py untouched).
    # Regression-tested in tests/greenfield/test_pipeline.py (5 tests).
