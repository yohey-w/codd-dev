    have no `codd: covers vb=` marker". The early fixtures/helper task legitimately writes no covering tests
    (later tasks do), so judged against the whole project''s VBs it saw ~0 coverage and hard-failed before
    the covering tasks could run. A single-task project (e.g. a CLI todo) never surfaced this because there
    one implement == the whole project; with 30 tasks the granularity assumption broke.'
  root_cause: 'the verifiable-behavior coverage gate (codd.verifiable_behavior_audit.run_implement_coverage_gate,
    invoked via the implementer''s per-task gate) is PROJECT-WIDE — it reconciles every VB id declared across
    the test documents against `codd: covers vb=` markers anywhere in the suite — but the greenfield pipeline
    enforced it PER implement task (codd/greenfield/pipeline.py _default_implement_task_runner called the
    project-wide gate inside every task). Per-task enforcement of a project-wide invariant means any task that
    is not the one writing the covering tests fails, even though the stage as a whole would satisfy the gate
    once all tasks complete. The gate is RIGHT to want full coverage; it was enforced at the WRONG granularity.'
  fix_commit: null  # filled by a tiny follow-up commit after this lands (self-reference; c25d006 precedent)
  fix_description: 'codd/greenfield/pipeline.py — the project-wide VB coverage gate is now enforced ONCE per
    implement STAGE instead of once per task. (1) Per-task: _default_implement_task_runner no longer calls
    the coverage gate (the old _enforce_coverage_gate per-task call was removed); each task still gets its
    per-file syntax + confusable gates and tests via implement_tasks, so a single early task is never judged
    against all project VBs. (2) Once-per-stage: a new _enforce_stage_coverage_gate runs at the END of
    _stage_implement, after every implement task has completed and all covering tests therefore exist; it
    calls the existing project-wide run_implement_coverage_gate ONCE (design_node=None, audited output paths
    = the configured scan.test_dirs so the audit evaluates the full project), with no rerun wired — by stage
    end an uncovered VB is a genuine stage failure, raised as a StageError carrying the gap list, recorded on
    the implement stage record and surfaced through the existing checkpoint/resume machinery. (3) The
    greenfield coverage_gate option still controls it: _stage_implement passes options[coverage_gate] through,
    and _enforce_stage_coverage_gate returns early when it is False (--no-coverage-gate / greenfield.coverage_gate:
