- id: PC-d7-ai-call-hang
  axis: D7
  hypothesis: A model CLI that stalls a SINGLE call indefinitely with no error and no output (a silent
    no-return hang, not a returned transport error) must NOT freeze the pipeline forever. Every AI subprocess
    call needs a finite wall-clock timeout that kills the child and routes the stall into the same transient
    auto-retry as a dropped socket. Build + regression-test the timeout, the kill-on-timeout, and the
    transient routing.
  origin: derived:F-ai-call-hang
  priority: 1
  status: done  # 2026-06-12 — surfaced+fixed F-ai-call-hang (codd/ai_invoke.py per-call wall-clock timeout
    # at the shared chokepoint; TimeoutExpired kills the child and routes into the existing bounded transient
    # auto-retry; configurable via ai.call_timeout_seconds / CODD_AI_CALL_TIMEOUT). Regression-tested in
    # test_ai_invoke.py.
