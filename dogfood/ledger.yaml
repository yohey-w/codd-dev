    --no-coverage-gate flag. Anti-false-green preserved: the gate is NOT disabled, only moved to the correct
    granularity. Preserves prior fixes (syntax gate 339a763, confusable 79294fe, transient/ceiling dc90c09,
    timeout da60634, stdout 3ea34b4). Generality gate held: developer-tool framing, no project/model/CLI names,
    CLI/model-agnostic. Full suite green (4221 passed, 0 skipped; was 4216 + 5 new tests).'
