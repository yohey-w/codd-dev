# ═══════════════════════════════════════════════════════════════════════════
# Dogfood Verification Loop — Ledger (machine-readable loop state)
# ═══════════════════════════════════════════════════════════════════════════
# SINGLE SOURCE OF TRUTH for the self-perpetuating dogfood loop. It survives
# sessions: an agent (or human) restarts the loop by reading THIS file, picking
# the next case, running it, and appending the result. Never restart from memory.
#
# The protocol that drives this ledger lives in dogfood/README.md. Read it
# before mutating this file. The loop tick `python dogfood/run_iteration.py`
# reads and writes the machine-readable parts of this file.
#
# ── TOP-LEVEL SCHEMA ─────────────────────────────────────────────────────────
# protocol_version : schema/loop-protocol version string.
# saturation_k     : K — consecutive finding-free runs needed to saturate an axis.
#
# model_roles:     the APPROVED executor assignment — which model runs which role
#                  in this QA harness. The loop has model-bearing roles and
#                  model-free machinery; this block records the assignment so the
#                  loop is reproducible and cost-bounded across sessions:
#     loop_machinery           : run_iteration.py tick, ledger I/O, convergence
#                                math — NO model (deterministic, free).
#     automatable_axes         : the deterministic axis runners (D7,D8,D10,D11,
#                                D14) — NO model.
#     sut_executor_default     : the model the system-under-test (the app/project
#                                CoDD builds) runs on for the LLM axes — the
#                                cheapest viable executor; Sonnet 4.6 is the floor
#                                (M1: a lighter model is the higher-sensitivity
#                                instrument; it surfaces harness gaps a stronger
#                                model papers over).
#     sut_executor_d6          : D6 is cross-CLI by definition — Codex (gpt-5.5
#                                xhigh).
#     iteration_driver         : selects the next case, judges real-vs-noise,
#                                derives sibling cases, updates the ledger —
#                                Opus 4.8 (Tier 2, episodic).
#     triage_and_fix           : root-cause a finding, fix CoDD core behind the
#                                generality gate, write the regression test —
#                                Opus 4.8 (M1: fix on the strongest practical
#                                model). Handles MECHANICAL findings (a bug patch
#                                to existing behaviour).
#     conceptual_finding_design : when triage classifies a finding as CONCEPTUAL —
#                                the right fix is a NEW abstraction or a NEW
#                                check-class, not a bug patch (precedent: the
#                                human/visual-judge finding that birthed the
#                                enablement check-axis) — the apex model (Fable 5)
#                                designs the new abstraction and the fix is
#                                committed+pushed AUTONOMOUSLY, exactly like a
#                                mechanical fix (Tier 3, apex, no owner-approval
#                                gate). Best-effort: the loop's content can trip
#                                Fable 5's content-safety classifiers and reroute
#                                to Opus 4.8 — a rerouted finding is designed+fixed
#                                by Opus AUTONOMOUSLY (it is NOT parked in an owner
#                                queue). The owner gets no per-finding approval
#                                request; loop findings, mechanical AND conceptual,
#                                resolve without a human gate.
#     portfolio_evolution      : periodic anti-convergence pass — "which failure
#                                class does NO current axis cover?" Discovers NEW
#                                dogfood axes / check-categories. Convergent
#                                case-derivation (Opus, Tier 2) drifts toward
#                                obvious variants; this divergent "what are we NOT
#                                testing" judgment is the apex role — Fable 5,
#                                AUTONOMOUS (Tier 3; owner informed, not gating).
#     reserved_for_owner_dialogue: Fable 5 is OUTSIDE the SUT role (too capable,
#                                would hide gaps, violating M1) and OUTSIDE the
#                                routine mechanical tiers (Opus is sufficient,
#                                cheaper, classifier-free). It is PRESENT at the
#                                apex tier (Tier 3 — conceptual-finding design +
#                                portfolio evolution above), which now runs
#                                AUTONOMOUSLY with no per-finding owner-approval
#                                step, and in the owner-facing PRODUCT-strategy
#                                conversation (genuinely novel product direction,
#                                not loop-internal fixes — that remains the owner's
#                                domain). Caveat: the loop's content — cross-model
#                                testing, input-validation/ adversarial cases,
#                                security-adjacent codebases — can trip Fable 5's
#                                content-safety classifiers, which auto-reroute to
#                                Opus 4.8; for the routine tiers Opus is assigned
#                                directly to avoid that reroute churn, and a
#                                rerouted Tier-3 finding is resolved by Opus
#                                autonomously (no owner queue).
#
# axes:            map D1..D14 -> per-axis state (the loop's saturation counters):
#   description          : the failure class this axis is designed to surface.
#   saturation_counter   : count of back-to-back runs with ZERO new findings.
#                          Reset to 0 the instant a finding appears on this axis.
#   last_run             : ISO date (or range) of the most recent run, or null.
#   status               : saturated | active | unrun | owner-only
#                          saturated == (saturation_counter >= saturation_k).
#                          owner-only == not autonomously runnable; only fires when
#                          the OWNER supplies a genuine input (see `automation:
#                          owner-only` below). owner-only axes are TRACKED but do
#                          NOT gate autonomous convergence.
#   cost                 : free | cheap | llm | human  (executor economics).
#   automation           : ci | scripted | manual | owner-only.
#                          owner-only == the axis CANNOT be run by an autonomous
#                          agent because doing so would make the agent both author
#                          AND solver, collapsing the very gap the axis tests (the
#                          divergent/human domain — see README "What dogfood CANNOT
#                          find"). Distinct from `manual`: a `manual` axis is an
#                          LLM/human-driven axis the autonomous loop CAN still run
#                          (the agent supplies a genuine third-party-style input);
#                          an `owner-only` axis requires a GENUINE owner-supplied
#                          input the agent must not fabricate. owner-only axes are
#                          EXCLUDED from the autonomous convergence requirement
#                          (convergence = all AUTONOMOUS axes saturated AND no
#                          autonomous pending_cases; owner-only axes/cases are
#                          tracked but never gate and are never auto-selected).
#   runner               : how to run it (script path or a named README protocol).
#   sut_model            : which executor runs the system-under-test on this axis
#                          (mirrors model_roles): none for deterministic/non-LLM
#                          axes (D7,D8,D10,D11,D14); sonnet for the LLM
#                          input-family axes (D1-D5,D9); codex for the cross-CLI
#                          axis (D6); benchmark-harness for D12 (whatever the
#                          external benchmark uses); human for D13. Driver/triage
#                          run on Opus 4.8 regardless of axis (see model_roles).
#   history              : (optional) human narrative of notable past runs.
#
# findings:        flat list (the loop's memory of every real defect), each:
#   id             : stable id, e.g. "F-plural-type".
#   axis           : the axis that surfaced it (D1..D14).
#   date           : ISO date observed.
#   model_used     : the executor that surfaced it (M1: the weakest one usually;
#                    drawn from the model_roles assignment — typically the
#                    sut_model of the axis that surfaced it, or "deterministic
#                    (no LLM)" for the automatable axes).
#   symptom        : what was observed.
#   root_cause     : why it happened (blank/"under-investigation" if open).
#   fix_commit     : commit/version that closed it, or null if OPEN.
#   regression_test: the test that pins the fix so it can never silently return.
#   status         : fixed | open | wontfix.
#   class          : (optional) mechanical | conceptual. mechanical == a bug patch
#                    to existing behaviour, designed+fixed on Opus 4.8 (Tier 2).
#                    conceptual == the fix is a NEW abstraction or NEW check-class,
#                    not a patch — designed by Fable 5 (reroute→Opus) and
#                    committed+pushed AUTONOMOUSLY (Tier 3, no owner-approval gate).
#                    The class now only routes WHICH MODEL designs the fix, not
#                    whether a human approves it.
#                    Absent == treat as mechanical (the default routine path).
#   derived_case_ids: ids in `pending_cases` this finding spawned (loop fuel).
#
# pending_cases:   the work queue (derived + planned cases), each:
#   id             : stable id, e.g. "PC-d6-codex-live".
#   axis           : axis this case exercises.
#   hypothesis     : what we expect to learn / the question it answers.
#   origin         : "seed" | "derived:<finding-id>" | "world-change:<event>".
#   priority       : 1 (highest) .. 5.
#   status         : pending | running | done | blocked.
#
# ── CONVERGENCE / SATURATION / DERIVE (the heart) ────────────────────────────
#   An axis is SATURATED only after K=2 consecutive finding-free runs.
#   A NEW finding RESETS its axis's saturation_counter to 0 (and may reset
#   sibling axes — see README "RESET"). Every finding DERIVES follow-up cases
#   appended to pending_cases. The loop is:
#       converged := (every AUTONOMOUS axis.status == "saturated")
#                    AND (no AUTONOMOUS pending_cases with status in {pending, running})
#   AUTONOMOUS == automation != "owner-only". owner-only axes (and their
#   pending_cases) are TRACKED but EXCLUDED from this requirement: an autonomous
#   agent cannot run them without fabricating the owner-supplied input, which would
#   make it both author and solver and collapse the gap the axis tests. So they
#   never gate autonomous convergence and are never auto-selected as the next case.
#   Because findings keep minting pending_cases, saturation is a moving target —
#   that is what makes the loop continue "until no problems occur".
# ═══════════════════════════════════════════════════════════════════════════

protocol_version: '1.1'
saturation_k: 2
model_roles:
  loop_machinery: none
  automatable_axes: none
  sut_executor_default: claude sonnet 4.6
  sut_executor_d6: codex gpt-5.5 xhigh
  iteration_driver: claude opus 4.8
  triage_and_fix: claude opus 4.8
  conceptual_finding_design: claude fable 5 (apex; autonomous — no owner-approval gate; reroute→opus, also autonomous)
  portfolio_evolution: claude fable 5 (apex; autonomous; anti-convergence)
  reserved_for_owner_dialogue: claude fable 5 (apex tier present in loop, autonomous; owner-facing product-strategy dialogue only — not a per-finding gate)
axes:
  D1:
    description: first-contact / dialect — failures that appear only when a non-builder hand-writes input
      in their own dialect (plural/loose type names, prose, naive layouts). Stubs never discover these
      (M2); only real first contact.
    saturation_counter: 0
    last_run: '2026-06-11'
    status: active
    cost: llm
    automation: manual
    runner: README 'First-contact protocol' — weakest viable model (D5).
    sut_model: sonnet
    history:
    - '2026-06-11: hand-written todo-CLI greenfield (claude sonnet, joint D1+D5) — surfaced F-plural-type
      and F-verify-exit0 (both fixed e97fa1e/cb25158).'
  D2:
    description: messy-human requirements — elicitation/coherence failures on contradictory, duplicated,
      or under-specified human requirements (the input is the test).
    saturation_counter: 0
    last_run: null
    status: owner-only
    cost: llm
    automation: owner-only
    runner: README 'Messy-requirements protocol' — OWNER-SUPPLIED input only (the agent must NOT fabricate
      the requirements doc).
    sut_model: sonnet
    note: 'Out of scope for the autonomous loop — fabricating raw requirements collapses the gap this axis
      tests (author==solver). Fires only when the owner supplies a genuine requirements doc.'
    history:
    - '2026-06-12: reclassified owner-only. D2 verifies the gap between a real human''s raw/under-specified
      requirements and CoDD''s elicit/open_questions machinery. If an autonomous agent fabricates the "raw
      human requirements", it is both author and solver — the gap collapses and the run is theater
      (self-made problem, self-solved). This is the documented "what dogfood CANNOT find" boundary (the
      divergent/human domain), so D2 is not autonomously-runnable: it fires ONLY when the owner supplies a
      genuine requirements doc. Tracked but EXCLUDED from autonomous convergence (does not gate, never
      auto-selected).'
  D3:
    description: stack rotation — language/framework/IaC assumptions baked into the harness, surfaced
      by rotating to a NEW stack each run.
    saturation_counter: 0
    last_run: null
    status: unrun
    cost: llm
    automation: manual
    runner: README 'Stack-rotation protocol'.
    sut_model: sonnet
  D4:
    description: complexity ladder — scale-dependent failures; same pipeline, monotonically larger app
      (single-task CLI -> multi-task web -> larger). Surfaces resource ceilings AND granularity
      assumptions that only break above a task-count threshold.
    saturation_counter: 0
    last_run: '2026-06-13'
    status: active
    cost: llm
    automation: manual
    runner: README 'Complexity-ladder protocol'.
    sut_model: sonnet
    history:
    - '2026-06-11..12: household-budget web greenfield (claude sonnet, joint D4+D5) — surfaced
      F-output-32k (OPEN) + slow-amendment pace.'
    - '2026-06-13: multi-task greenfield (claude sonnet SUT, 30 implement tasks) failed at an EARLY task
      (test-fixtures) with "verifiable-behavior coverage gate failed: 45 of 45 verifiable behavior(s) have
      no covers vb= marker". The VB coverage gate is PROJECT-WIDE but the greenfield pipeline enforced it
      PER implement task, so any task that is not the one writing the covering tests (especially an early
      fixtures/helper task) saw ~0 coverage and hard-failed even though later tasks would add the markers.
      A single-task project never surfaced this (one implement == the whole project); the granularity
      assumption only breaks above a task-count threshold — a complexity-ladder (D4) finding. Surfaced+fixed
      F-vb-gate-per-task-granularity (gate disabled per-task in the greenfield runner; run ONCE project-wide
      after all implement tasks; honors the greenfield coverage_gate opt-out; standalone implement gate
      unchanged). saturation reset to 0.'
  D5:
    description: weakest-viable-model (instrument / MODIFIER, M1) — a weak model is the most SENSITIVE
      instrument; it trips on ambiguity a strong model papers over. Applied to input-family runs (D1-D4);
      findings recorded under the input axis.
    saturation_counter: 0
    last_run: '2026-06-12'
    status: active
    cost: cheap
    automation: manual
    runner: README 'Weakest-viable-model protocol' (modifier on D1-D4).
    sut_model: sonnet
    history:
    - '2026-06-12: greenfield run (claude sonnet SUT, Japanese-context app) repeatedly failed the SAME
      implement task (docs/test/test_strategy.md → src/index.py) — the model, primed by Japanese
      requirements/context, slipped a NON-ASCII typographic character into a CODE position (run 1: line 286
      。 U+3002 full-width period; run 2: line 4 — U+2014 em-dash). The FX1 write-time syntax gate correctly
      rejected each (nothing written, no false-green) but the model never self-corrected across the bounded
      retries: the generic "not valid Python (line N: invalid character X)" feedback did not steer it to
      ASCII. Surfaced+fixed F-syntax-gate-nonascii-feedback (actionable codepoint-aware retry feedback +
      bumped the bounded gate budget 2→3, configurable). Gate NOT weakened — a permanently-unfixable file
      still fails honestly. saturation reset to 0.'
    - '2026-06-12: owner-reported broader robustness gap (current-gen models, Sonnet AND Opus, emit
      non-ASCII LOOKALIKE/homoglyph chars intermittently) — distinct from the typographic-in-code case
      above. A Cyrillic е (U+0435) / а (U+0430) / і (U+0456) substituted for an ASCII letter INSIDE an
      otherwise-ASCII identifier (іd vs id; dеf as a mixed-script NAME) is a SYNTACTICALLY-VALID position:
      the file PARSES FINE, so the FX1 syntax gate (ast.parse) passes it — a NEW false-green class (passes
      parse, may pass tests written with the same wrong char, semantically broken: NameError / silent
      dict-key mismatch at runtime). The syntax gate structurally cannot catch it (the file is valid).
      Surfaced+fixed F-confusable-passthrough — a SEPARATE deterministic confusable detector
      (implement.confusable_check, default ON), a sibling check at the same write-time gate point.
      Conceptual: a NEW check LAYER, not a tweak to the existing gate. saturation stays 0 (new finding).'
  D6:
    description: cross-CLI live run — hidden coupling to one CLI/model. Running the same input through
      a different live CLI (codex etc.) surfaces prompt/format/ tooling assumptions. The declared-but-unverified
      multi-CLI risk.
    saturation_counter: 0
    last_run: '2026-06-12'
    status: active
    cost: llm
    automation: manual
    runner: README 'Cross-CLI protocol'.
    sut_model: codex
    history:
    - '2026-06-12: first live cross-CLI run (codex gpt-5.5 xhigh as SUT) on a greeter-CLI greenfield —
      working ai_command `codex exec --model gpt-5.5 -c model_reasoning_effort=xhigh --sandbox <ro|ws> --skip-git-repo-check
      --cd <proj>` (note: gpt-5.5-codex is rejected for ChatGPT accounts; plain gpt-5.5 works, model
      reply on stdout, diagnostics on stderr). init/plan(--init)/generate(--all-waves, 7 artifacts/4 waves)
      all drove cleanly via codex stdout — planner/generator are NOT claude-coupled. implement surfaced
      F-codex-filewriting-stdout (mechanical, fixed): the file-writing-agent path discarded codex''s valid
      `=== FILE:` stdout and demanded on-disk git writes. After fix, implement produced 4 working files
      and the generated greeter ran correctly (Hello, Alice! / exit2 on misuse). saturation reset to 0.'
  D7:
    description: chaos / interruption — resume/idempotency/dirty-state failures under kill->resume cycles
      and partially-written artifacts.
    saturation_counter: 0
    last_run: '2026-06-12'
    status: active
    cost: free
    automation: scripted
    runner: python dogfood/scripts/run_d7_chaos.py (stub-AI, randomized kill points).
    sut_model: none
    history:
    - '2026-06-12: surfaced F-transient-transport — a transient transport error (socket closed / connection
      reset / timeout / 429-5xx) aborted a live greenfield run and forced a manual --resume. Fixed at the
      AI-invocation chokepoint (codd/ai_invoke.py): recoverable-error classifier + bounded auto-retry, so a
      transient blip no longer needs human --resume. saturation reset to 0.'
    - '2026-06-12: surfaced F-ai-call-hang — a live greenfield run hung indefinitely on a SINGLE AI call
      (47min+, process Sl, ~0.9% CPU, NO error, NO output). dc90c09 could not help: it only retries when the
      CLI returns an error to classify, and a silent no-return stall returns nothing. Root cause: AI
      subprocess calls had no wall-clock timeout. Fixed at the same chokepoint (codd/ai_invoke.py): every AI
      subprocess call now carries a finite per-call timeout that kills the child and routes a stall into the
      EXISTING transient auto-retry (a one-off stall self-recovers; a persistent hang fails loudly after the
      bounded attempts instead of hanging forever). saturation reset to 0.'
  D8:
    description: adversarial content — prompt-injection in ingested docs and malicious/ escaping paths.
      Deterministic layers must treat all content as DATA, never execute embedded instructions, never
      read/write outside the project tree.
    saturation_counter: 1
    last_run: '2026-06-12'
    status: active
    cost: free
    automation: scripted
    runner: python dogfood/scripts/run_d8_adversarial.py.
    sut_model: none
  D9:
    description: lifecycle evolution — coherence drift across N sequential changes (codd-evolve / codd
      fix) on a living generated app; the long-tail failures of real delivery, invisible to one-shot runs.
    saturation_counter: 0
    last_run: '2026-06-10'
    status: active
    cost: llm
    automation: manual
    runner: README 'Lifecycle protocol'.
    sut_model: sonnet
    history:
    - '2026-05..06: osato-equivalent 2-month sequential delivery — surfaced enablement-coverage / dependency-freshness
      / requirement-reconciliation gaps (all fixed v2.22.0).'
  D10:
    description: round-trip fidelity — loss in the extract/restore round trip. Generate greenfield ->
      archive+delete docs -> extract/restore from code -> diff restored vs originals. Coverage drops are
      findings. Deterministic-measurable.
    saturation_counter: 1
    last_run: '2026-06-12'
    status: active
    cost: free
    automation: scripted
    runner: python dogfood/scripts/run_d10_roundtrip.py (deterministic extract+restoration coverage).
    sut_model: none
  D11:
    description: alien-repo zoo — parser/extractor crashes and silent misses on diverse real-world repos.
      DETERMINISTIC layers only (extract_facts, IaC->NFR, frontmatter, restoration_report). No LLM. Free,
      CI-able.
    saturation_counter: 1
    last_run: '2026-06-12'
    status: active
    cost: free
    automation: scripted
    runner: python dogfood/scripts/run_d11_zoo.py (reads dogfood/zoo.yaml; offline fixtures + optional
      real repos).
    sut_model: none
    history:
    - '2026-05..06: external-user brownfield repos (issues #27-29) — real alien repos, fixed 45726e6 (D11-equivalent).'
  D12:
    description: external benchmarks — regressions against an independently-curated benchmark (SWE-bench),
      with an anti-overfit guard.
    saturation_counter: 1
    last_run: '2026-06-11'
    status: active
    cost: llm
    automation: ci
    runner: external SWE-bench harness (out of this loop's free tier).
    sut_model: benchmark-harness
    history:
    - '2026-06-11: SWE-bench 73/73 passing, anti-overfit guard clean — no new findings (1 dry run).'
  D13:
    description: 'human-judge / visual acceptance — failures only a human eye catches: visual regressions,
      taste, broken UX that passes every automated gate. Findings enter the SAME triage as script findings.'
    saturation_counter: 0
    last_run: '2026-06-02'
    status: active
    cost: human
    automation: manual
    runner: README 'Human-judge protocol'.
    sut_model: human
    history:
    - '2026-06-02: demo-day human caught mobile nav disappearing on one viewport -> the environment-coverage
      axes were born (fixed v2.22.0).'
  D14:
    description: self-application — regressions in codd's own read-only checks when pointed at codd-dev
      itself (the harness eating its own cooking). Deterministic, free. Read-only only; cannot self-build
      (see README limits).
    saturation_counter: 1
    last_run: '2026-06-12'
    status: active
    cost: free
    automation: scripted
    runner: python dogfood/scripts/run_d14_self.py (dag verify red-check + config-key validation).
    sut_model: none
findings:
- id: F-plural-type
  axis: D1
  date: '2026-06-11'
  model_used: claude sonnet (weakest viable, M1)
  symptom: 'frontmatter `type: requirements` (plural) silently ignored by the type matcher — only the
    singular `requirement` was recognized; a hand-written doc using the plural produced zero discovery.'
  root_cause: type vocabulary matching was singular-exact; no plural/loose-form tolerance for the type
    field.
  fix_commit: e97fa1e
  regression_test: tests/greenfield/test_pipeline.py (plural-type acceptance)
  status: fixed
  class: mechanical
  derived_case_ids:
  - PC-d1-type-vocab-audit
- id: F-resume-options
  axis: D7
  date: '2026-06-11'
  model_used: claude sonnet
  symptom: resume did not restore previously-selected options — an interrupted run resumed with defaults,
    losing the operator's choices.
  root_cause: session checkpoint did not persist/replay the selected-option set across resume.
  fix_commit: e97fa1e
  regression_test: tests/greenfield/test_pipeline.py (resume option restoration)
  status: fixed
  class: mechanical
  derived_case_ids:
  - PC-d7-kill-resume
- id: F-output-fragmentation
  axis: D4
  date: '2026-06-11'
  model_used: claude sonnet
  symptom: src/<task_id>/ path fragmentation — code from multiple tasks scattered into per-task app copies
    instead of one canonical tree.
  root_cause: implement output rooting keyed on task id rather than the design doc's canonical output
    path.
  fix_commit: cb25158
  regression_test: tests/greenfield/test_pipeline.py (two tasks coexist in one output root)
  status: fixed
  class: mechanical
  derived_case_ids: []
- id: F-fence-contamination
  axis: D5
  date: '2026-06-11'
  model_used: claude sonnet
  symptom: markdown-fence contamination — ```-fences leaked into generated source files.
  root_cause: 'the implement file-extraction did not strip surrounding code fences from the model''s `===
    FILE: ===` blocks.'
  fix_commit: cb25158
  regression_test: tests/greenfield/test_pipeline.py (fence-stripped output)
  status: fixed
  class: mechanical
  derived_case_ids: []
- id: F-verify-false-green
  axis: D5
  date: '2026-06-11'
  model_used: claude sonnet
  symptom: verify reported false-green — it certified a build whose implementation was incomplete / whose
    tests were never actually executed.
  root_cause: verify accepted an unexecuted build as passing; no proof the generated tests ran.
  fix_commit: cb25158
  regression_test: tests/greenfield/test_pipeline.py (verify proves tests ran)
  status: fixed
  class: mechanical
  derived_case_ids: []
- id: F-verify-exit0
  axis: D1
  date: '2026-06-11'
  model_used: claude sonnet
  symptom: verify exited 0 even when the test suite was red.
  root_cause: the verify stage did not propagate a nonzero exit when the underlying suite failed.
  fix_commit: cb25158
  regression_test: tests/greenfield/test_cli_flags.py (verify exit code reflects suite result)
  status: fixed
  class: mechanical
  derived_case_ids:
  - PC-d6-codex-live
- id: F-output-32k
  axis: D4
  date: '2026-06-12'
  model_used: claude sonnet (weakest viable, M1)
  symptom: 32k output-token ceiling on big implement tasks — a model CLI aborts a single call with
