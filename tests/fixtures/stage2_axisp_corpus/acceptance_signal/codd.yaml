# Stage-2 (Axis-P) positive corpus fixture: acceptance_signal
#
# Construction rule (so gold is derived, not hand-judged):
#   A user_journey declares an expected_outcome (expected_outcome_refs) and a
#   plan task produces it, but NO e2e verification test covers the journey. By
#   the C7 user_journey_coherence contract that is, by construction, a
#   no_e2e_test_for_journey gap (kind=acceptance_signal, dimension=journey,
#   subject=<journey name>).
#
# This is a detector HIT case: a journey with a plan task but no e2e test is a
# red no_e2e_test_for_journey, so the gold gap is matched (no miss).
design_doc_patterns:
  - docs/design/*.md
impl_file_patterns:
  - src/**/*.ts
test_file_patterns:
  - tests/**/*.ts
plan_task_file: docs/design/implementation_plan.md
lexicon_file: project_lexicon.yaml
